async function agUploadReq(itemId, idx) {
  const fi = document.getElementById(`fi-${itemId}-${idx}`);
  const noteEl = document.getElementById(`an-${itemId}-${idx}`);
  if (!fi || !fi.files[0]) { toast('❗ يرجى اختيار ملف أولاً'); return; }

  const it = ALL_ITEMS.find(i => i.id === itemId);
  const file = fi.files[0];

  try {
    loading(true, 'جاري رفع الملف...');
    // رفع الملف إلى Supabase Storage
    // استخدام timestamp + امتداد الملف فقط لتجنب أي مشكلة في Storage
    const ext = file.name.includes('.') ? file.name.split('.').pop().toLowerCase() : 'bin';
    const safeExt = ext.replace(/[^a-z0-9]/g, '');
    const path = `${CU.agency}/${itemId}/${idx}_${Date.now()}.${safeExt}`;
    const fileUrl = await sbUploadFile(path, file);

    const rs = getReqStatus(it);
    const now = new Date().toISOString();
    const agNote = noteEl ? noteEl.value.trim() : '';

    // إضافة الحدث لسجل التتبع
    const history = rs[idx]?.history || [];
    history.push({
      type: 'agency_upload',
      label: 'رفع الجهة',
      file: file.name,
      file_url: fileUrl,
      note: agNote,
      date: now,
      by: CU.name || CU.id
    });

    // حفظ الملف السابق في file_history
    const fileHistory = rs[idx]?.file_history || [];
    if (rs[idx]?.file) fileHistory.push({file:rs[idx].file, file_url:rs[idx].file_url||'', uploaded_at:rs[idx].uploaded_at||''});

    rs[idx] = {
      file: file.name,
      file_url: fileUrl,
      uploaded_at: now,
      agency_note: agNote,
      committee_note: '',
      status: 'under_review',
      file_history: fileHistory,
      history: history,
      reviewed_by: rs[idx]?.reviewed_by || ''
    };

    await sbPatch('procedures', itemId, {req_status: JSON.stringify(rs)});

function render_ag_track() {
  // صف لكل متطلب (جميع الحالات) — نفس شكل الإجراءات الواردة بدون زر عرض
  const rows = [];
  mine().forEach(it => {
    const reqs = getReqList(it);
    const rs   = getReqStatus(it);
    const critLabel = it.inst_crit_num
      ? `${it.inst_crit_num} — ${it.inst_crit_title}`
      : it.proc;
    // سطر لكل متطلب — نستخدم reqs (النصوص) كمصدر رئيسي
    reqs.forEach((reqText, idx) => {
      const r = rs[idx] || {status:'pending'};
      rows.push({it, idx, reqText, r, critLabel});
    });
  });

  document.getElementById('ag-track').innerHTML = `
    <div class="ph"><div class="pht"><h1>تتبع الإجراءات</h1></div>
    <button class="btn btn-g btn-sm" onclick="loadAll().then(()=>{render_ag_track();toast('تم التحديث')})">🔄</button></div>
    ${buildFilterBar('af-track','render_ag_track_filtered()')}
    <div class="card"><div class="tw"><table class="tbl">
      <thead><tr><th>المحك</th><th>المتطلب</th><th>الحالة</th><th>تفاصيل</th></tr></thead>
      <tbody id="af-track-body">
      ${rows.length ? rows.map(({it, idx, reqText, r, critLabel}) => {
        const st = r.status || 'pending';
        let badge = '';
        if      (st==='pending')      badge = '<span class="bdg bs">⬜ قيد الاستكمال</span>';
        else if (st==='under_review') badge = '<span class="bdg bu">🔵 قيد المراجعة</span>';
        else if (st==='returned')     badge = '<span class="bdg br">↩ معاد للملاحظات</span>';
        else if (st==='completed')    badge = '<span class="bdg ba">✅ مكتملة</span>';
        return `
          <tr>
            <td style="font-weight:600;font-size:12px">${critLabel}</td>
            <td style="font-size:12px">${reqText}</td>
            <td>${badge}</td>
          </tr>
          ${st==='returned' && r.committee_note
            ? `<tr><td colspan="3" style="font-size:11px;color:#b91c1c;padding-right:28px">↩ ملاحظة: ${r.committee_note}</td></tr>`
            : ''}`;
      }).join('') : '<tr><td colspan="3" class="empty">لا توجد إجراءات مُرسلة بعد</td></tr>'}
      </tbody>
    </table></div></div>`;
  setTimeout(()=>showFilterCount('af-track',rows.length,rows.length),0);
}
window.render_ag_track = render_ag_track;

function render_ag_track_filtered() {
  const allRows=[];
  mine().forEach(it=>{
    const reqs=getReqList(it),rs=getReqStatus(it);
    const critLabel=it.inst_crit_num?`${it.inst_crit_num} — ${it.inst_crit_title}`:it.proc;
    reqs.forEach((reqText,idx)=>{const r=rs[idx]||{status:'pending'};
      allRows.push({it,idx,reqText,r,critLabel});});
  });
  const filtered=applyFilters(allRows,'af-track');
  const tbody=document.getElementById('af-track-body');
  if(!tbody) return;
  tbody.innerHTML=filtered.length?filtered.map(({reqText,r,critLabel})=>{
    let badge='';
    const st=r.status||'pending';
    if(st==='pending') badge='<span class="bdg bs">⬜ غير مكتمل</span>';
    else if(st==='under_review') badge='<span class="bdg bu">🔵 قيد المراجعة</span>';
    else if(st==='returned') badge='<span class="bdg br">↩ معاد للملاحظات</span>';
    else if(st==='completed') badge='<span class="bdg ba">✅ مكتملة</span>';
    return `<tr>
      <td style="font-weight:600;font-size:12px">${critLabel}</td>
      <td style="font-size:12px">${reqText}</td>
      <td>${badge}</td>

  }).join(''):'<tr><td colspan="3" class="empty">لا توجد نتائج</td></tr>';

}

function render_adm_home()   {
  // نفس إحصائيات العمادة
  const t=ALL_ITEMS.length;
  let pendingReqs=0,underReview=0,returned=0,completed=0;
  ALL_ITEMS.forEach(it=>getReqStatus(it).forEach(r=>{
    if(r.status==='pending')pendingReqs++;
    else if(r.status==='under_review')underReview++;
    else if(r.status==='returned')returned++;
    else if(r.status==='completed')completed++;
  }));
  let admTotalExpected=0;
  INST_CRITERIA.forEach(m=>m.subs.forEach(s=>s.criteria.forEach(c=>{
    admTotalExpected+=(INST_REQUIREMENTS[c.num]||[]).filter(r=>r&&r.trim()).length;
  })));
  const totalExpectedReqs = admTotalExpected;
  const admNotSent=Math.max(0,admTotalExpected-(pendingReqs+underReview+returned+completed));
  updateBadges();

  function donut(data,size=130){
    const r=50,cx=65,cy=65;
    const total=data.reduce((s,d)=>s+d.v,0);
    if(!total)return `<svg width="${size}" height="${size}" viewBox="0 0 130 130"><circle cx="65" cy="65" r="50" fill="none" stroke="#e5e7eb" stroke-width="18"/><text x="65" y="71" text-anchor="middle" font-size="13" fill="#9ca3af" font-family="Cairo">لا بيانات</text></svg>`;
    let angle=-90; const slices=[];
    data.forEach(d=>{if(!d.v)return; const pct=d.v/total; const sa=angle*Math.PI/180,ea=(angle+pct*360)*Math.PI/180;
      const x1=cx+r*Math.cos(sa),y1=cy+r*Math.sin(sa),x2=cx+r*Math.cos(ea),y2=cy+r*Math.sin(ea);
      slices.push(`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${pct>0.5?1:0},1 ${x2},${y2} Z" fill="${d.c}" opacity="0.9"/>`);
      angle+=pct*360;});
    slices.push(`<circle cx="${cx}" cy="${cy}" r="32" fill="white"/>`);
    const ml=data.reduce((p,c)=>c.v>p.v?c:p,data[0]);
    slices.push(`<text x="${cx}" y="${cy-5}" text-anchor="middle" font-size="17" font-weight="bold" fill="#1f2937" font-family="Cairo">${ml.v}</text>`);
    slices.push(`<text x="${cx}" y="${cy+12}" text-anchor="middle" font-size="9" fill="#6b7280" font-family="Cairo">${ml.l}</text>`);
    return `<svg width="${size}" height="${size}" viewBox="0 0 130 130">${slices.join('')}</svg>`;
  }
  const reqData=[{v:completed,c:'#16a34a',l:'مكتمل'},{v:underReview,c:'#2563eb',l:'قيد المراجعة'},{v:returned,c:'#dc2626',l:'معاد للملاحظات'},{v:pendingReqs,c:'#d1d5db',l:'قيد الاستكمال'}];
  const totalReqs=pendingReqs+underReview+returned+completed;

  document.getElementById('adm-home').innerHTML=`
    <div class="ph"><div class="pht"><h1>نظرة عامة</h1><p>مدير النظام — صلاحيات كاملة</p></div>
    <button class="btn btn-g btn-sm" onclick="loadAll().then(()=>{render_adm_home();toast('تم التحديث')})">🔄</button></div>
    <div class="sr">
      <div class="sc" style="border-top:3px solid #374151"><div class="ico">📤</div><div class="num">${t}</div><div class="lbl">إجراءات مُرسلة</div></div>
      <div class="sc" style="border-top:3px solid #2563eb"><div class="ico">🔵</div><div class="num">${underReview}</div><div class="lbl">قيد المراجعة</div></div>
      <div class="sc" style="border-top:3px solid #16a34a"><div class="ico">✅</div><div class="num">${completed}</div><div class="lbl">مكتمل</div></div>
      <div class="sc" style="border-top:3px solid #b45309"><div class="ico">⏳</div><div class="num">${pendingReqs}</div><div class="lbl">لم يُرفع</div></div>
    </div>
    <div class="g2">
      <div class="card"><div class="ctit">📊 توزيع المتطلبات</div>
        <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
          <div>${donut(reqData)}</div>
          <div style="flex:1;min-width:110px">${reqData.map(d=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;font-size:12px">
            <div style="width:10px;height:10px;border-radius:50%;background:${d.c};flex-shrink:0"></div>
            <span style="flex:1">${d.l}</span><strong>${d.v}</strong>
            <span style="color:var(--mu);font-size:10px">${totalExpectedReqs?Math.round(d.v/totalExpectedReqs*100):0}%</span>
          </div>`).join('')}
          <div style="border-top:1px solid var(--bd);margin-top:8px;padding-top:8px;font-size:12px;font-weight:700">الإجمالي: ${totalExpectedReqs} متطلب</div></div>
        </div>
      </div>
      <div class="card"><div class="ctit">${ico.ppl}الجهات</div>
        <table class="tbl"><thead><tr><th>الجهة</th><th>✅</th><th>🔵</th><th>↩</th><th>⬜</th><th>%</th></tr></thead><tbody>
        ${Object.entries({...AGS,...EXTRA_AGENCIES}).map(([k,ag])=>{
          let p=0,u=0,rv=0,c=0;
          ALL_ITEMS.filter(i=>i.agency===k).forEach(it=>getReqStatus(it).forEach(x=>{
            if(x.status==='pending')p++;else if(x.status==='under_review')u++;else if(x.status==='returned')rv++;else if(x.status==='completed')c++;
          }));
          const tot=p+u+rv+c; const pct=tot?Math.round(c/tot*100):0;
          return `<tr><td style="font-size:11px">${ag.icon||''} ${ag.name}</td><td>${c}</td><td>${u}</td><td>${rv}</td><td>${p}</td>
            <td><div class="prog" style="min-width:60px"><div class="pf" style="width:${pct}%;background:${pct===100?'#16a34a':'#374151'}"></div></div>${pct}%</td></tr>`;
        }).join('')}</tbody></table>
      </div>
    </div>`;
}

async function admDecideReq(itemId,idx,decision) {
  const note=(document.getElementById(`adm-note-${itemId}-${idx}`)?.value||'').trim();
  const it=ALL_ITEMS.find(i=>i.id===itemId); if(!it) return;
  const rs=getReqStatus(it);
  const decNow = new Date().toISOString();
  const decHistory = rs[idx].history || [];
  decHistory.push({type:decision==='completed'?'committee_complete':'committee_return',
    label:decision==='completed'?'اعتماد':'إعادة للملاحظات',
    note:decision==='returned'?note:'', date:decNow, by:CU.name||CU.id});
  rs[idx].history = decHistory;
  rs[idx].status=decision; rs[idx].committee_note=decision==='returned'?note:''; rs[idx].reviewed_by=CU.name; rs[idx].history=decHistory;
  try {
    loading(true,'جاري حفظ القرار...');
    await sbPatch('procedures',itemId,{req_status:JSON.stringify(rs)});
    const label=decision==='completed'?'اعتماد':'إعادة للملاحظات';
    await sbPost('activity_log',{msg:`[مدير النظام] ${label}: "${getReqList(it)[idx]}" (${it.agency_name})`,actor:CU.name});
    await loadAll(); loading(false);
    showScreen('adm-appr'); render_adm_appr();
    toast(decision==='completed'?'✅ تم الاعتماد':'↩ تم الإعادة',decision==='completed');
  } catch(e){loading(false);toast('❗ فشل: '+e.message);}
}

function admFilterLog(){
  const q=(document.getElementById('admlog-q')?.value||'').toLowerCase();
  const actor=document.getElementById('admlog-actor')?.value||'';
  const from=document.getElementById('admlog-from')?.value||'';
  const to=document.getElementById('admlog-to')?.value||'';
  const filtered=ALL_LOGS.filter(l=>{
    if(q&&!l.msg?.toLowerCase().includes(q)&&!l.actor?.toLowerCase().includes(q))return false;
    if(actor&&l.actor!==actor)return false;
    const day=l.created_at?l.created_at.split('T')[0]:'';
    if(from&&day<from)return false; if(to&&day>to)return false; return true;
  });
  const body=document.getElementById('admlog-body'),cnt=document.getElementById('admlog-count');
  if(body)body.innerHTML=renderLogItems(filtered);
  if(cnt)cnt.textContent=`${filtered.length} من ${ALL_LOGS.length} نشاط`;
}

function addNewAgency() {
  const name  = document.getElementById('nag-name').value.trim();
  const nameEn = (document.getElementById('nag-name-en')?.value||'').trim();
  const key   = document.getElementById('nag-key').value.trim().toLowerCase().replace(/\s+/g,'_');
  const pass  = document.getElementById('nag-pass').value.trim();
  const icon  = document.getElementById('nag-icon').value;
  const color = document.getElementById('nag-color').value;
  const msg   = document.getElementById('nag-msg');

  const showMsg = (text, ok) => {
    msg.style.display='block';
    msg.style.background=ok?'var(--okb)':'var(--erb)';
    msg.style.color=ok?'var(--ok)':'var(--er)';
    msg.style.border=ok?'1px solid var(--okbrd)':'1px solid var(--erbrd)';
    msg.textContent=text;
  };

  if (!name||!key||!pass) { showMsg('❗ يرجى ملء الاسم والمفتاح وكلمة المرور', false); return; }
  if (!/^[a-z][a-z0-9_]*$/.test(key)) { showMsg('❗ المفتاح يجب أن يكون بالإنجليزية فقط (حروف وأرقام وشرطة سفلية)', false); return; }
  if (USERS[key]) { showMsg('❗ هذا المفتاح مستخدم بالفعل، اختر مفتاحاً آخر', false); return; }
  if (pass.length < 4) { showMsg('❗ كلمة المرور يجب أن تكون 4 أحرف على الأقل', false); return; }

  // Add to extra agencies and USERS
  const grad = `linear-gradient(135deg, ${color}dd, ${color})`;
  EXTRA_AGENCIES[key] = {name, name_en:nameEn, icon, color};
  USERS[key] = {pass, name, name_en:nameEn, role:'agency', agency:key, grad};
  // نسجّل الترجمة في القاموس لتظهر فوراً
  if (nameEn) I18N[name] = nameEn;

  sbPost('activity_log', {msg:`إضافة جهة جديدة: ${name} (مفتاح: ${key})`, actor:'عمادة التطوير والجودة'});
  // Save extra agencies permanently to Supabase
  const agToSave = {};
  Object.entries(EXTRA_AGENCIES).forEach(([k,ag]) => {
    agToSave[k] = {...ag, pass: USERS[k]?.pass||''};
  });
  sbUpsert('settings', {key:'extra_agencies', value:JSON.stringify(agToSave), updated_at:new Date().toISOString()})
    .catch(()=>{});

  showMsg(`✅ تمت إضافة "${name}" بشكل دائم — المفتاح: ${key} — كلمة المرور: ${pass}`, true);
  document.getElementById('nag-name').value='';
  if(document.getElementById('nag-name-en')) document.getElementById('nag-name-en').value='';
  document.getElementById('nag-key').value='';
  document.getElementById('nag-pass').value='';

  // Refresh selects in send form if visible
  const csA = document.getElementById('cs-a');
  if(csA) {
    const allAg = getAllAgencies();
    csA.innerHTML='<option value="">— اختر —</option>'+Object.entries(USERS).filter(([k])=>k!=='committee'&&k!=='admin').map(([k,u])=>`<option value="${u.agency||k}">${allAg[u.agency||k]?.icon||'🏢'} ${u.name}</option>`).join('');
  }
}

function removeAgency(key) {
  const u = USERS[key];
  if(!u) return;
  if(!confirm(`حذف جهة "${u.name}"؟ سيتم حذف جميع إجراءاتها أيضاً.`)) return;
  const agKey = u.agency || key;
  delete EXTRA_AGENCIES[agKey];
  delete USERS[key];
  // Remove their items from DB
  const toDelete = ALL_ITEMS.filter(i=>i.agency===agKey);
  Promise.all(toDelete.map(it=>sbDelete('procedures',it.id))).then(async ()=>{
    // Update saved extra agencies
    const agToSave = {};
    Object.entries(EXTRA_AGENCIES).forEach(([k,ag]) => {
      agToSave[k] = {...ag, pass: USERS[k]?.pass||''};
    });
    await sbUpsert('settings', {key:'extra_agencies', value:JSON.stringify(agToSave), updated_at:new Date().toISOString()})
      .catch(()=>{});
    return loadAll();
  }).then(()=>{
    render_c_agencies();
    toast(`تم حذف جهة "${u.name}"`);
  });
}

async function doClearAll() {
  const confirm_val = document.getElementById('clear-confirm')?.value.trim();
  if(confirm_val !== 'مسح') { toast('❗ اكتب كلمة "مسح" للتأكيد'); return; }
  if(!confirm(`حذف جميع الإجراءات (${ALL_ITEMS.length}) نهائياً من Supabase؟`)) return;
  loading(true, 'جاري مسح جميع الإجراءات...');
  try {
    await Promise.all(ALL_ITEMS.map(it => sbDelete('procedures', it.id)));
    await sbPost('activity_log', {msg:`مسح جميع الإجراءات (${ALL_ITEMS.length} إجراء)`, actor:'عمادة التطوير والجودة'});
    await loadAll(); loading(false);
    render_c_clear(); render_c_home();
    toast('✅ تم مسح جميع الإجراءات', true);
  } catch(e) { loading(false); toast('❗ فشل المسح: '+e.message); }
}

async function doClearByStatus(status) {
  const items = ALL_ITEMS.filter(i=>i.status===status);
  const labels = {approved:'المعتمدة', rejected:'المرجوعة', pending:'قيد الانتظار', uploaded:'جاهز للاعتماد'};
  if(!items.length) { toast('لا توجد إجراءات بهذه الحالة'); return; }
  if(!confirm(`حذف ${items.length} إجراء من ${labels[status]}؟`)) return;
  loading(true, 'جاري الحذف...');
  try {
    await Promise.all(items.map(it => sbDelete('procedures', it.id)));
    await sbPost('activity_log', {msg:`حذف ${items.length} إجراء (${labels[status]})`, actor:'عمادة التطوير والجودة'});
    await loadAll(); loading(false);
    render_c_clear(); render_c_home();
    toast(`✅ تم حذف ${items.length} إجراء من ${labels[status]}`, true);
  } catch(e) { loading(false); toast('❗ فشل الحذف: '+e.message); }
}

async function addReviewer() {
  const name = document.getElementById('nrv-name').value.trim();
  const key  = document.getElementById('nrv-key').value.trim().toLowerCase().replace(/\s+/g,'_');
  const pass = document.getElementById('nrv-pass').value.trim();
  const criteria = Array.from(document.querySelectorAll('.nrv-crit:checked')).map(c=>c.value);
  const msg = document.getElementById('nrv-msg');

  const showMsg = (t, ok) => {
    msg.style.display='block';
    msg.style.background=ok?'var(--okb)':'var(--erb)';
    msg.style.color=ok?'var(--ok)':'var(--er)';
    msg.style.border=ok?'1px solid var(--okbrd)':'1px solid var(--erbrd)';
    msg.textContent=t;
  };

  const email = document.getElementById('nrv-email').value.trim();
  if (!name||!email||!key||!pass) { showMsg('❗ يرجى ملء جميع الحقول', false); return; }
  if (!/^[a-z][a-z0-9_]*$/.test(key)) { showMsg('❗ المفتاح يجب أن يكون بالإنجليزية', false); return; }
  if (USERS[key])                { showMsg('❗ هذا المفتاح مستخدم بالفعل', false); return; }
  if (!criteria.length)          { showMsg('❗ يرجى تحديد معيار واحد على الأقل', false); return; }

  const grad = 'linear-gradient(135deg,#065f46,#059669)';
  REVIEWERS[key] = {name, email, pass, criteria, grad};
  USERS[key] = {pass, name, email, role:'reviewer', reviewerCriteria:criteria, grad};

  try {
    await sbUpsert('settings', {key:'reviewers', value:JSON.stringify(REVIEWERS), updated_at:new Date().toISOString()});
    await sbPost('activity_log', {msg:`إضافة مراجع جديد: ${name} (${key}) — معايير: ${criteria.join(', ')}`, actor:'عمادة التطوير والجودة'});
    showMsg(`✅ تمت إضافة المراجع "${name}"`, true);
    document.getElementById('nrv-name').value='';
    document.getElementById('nrv-email').value='';
    document.getElementById('nrv-key').value='';
    document.getElementById('nrv-pass').value='';
    document.querySelectorAll('.nrv-crit').forEach(c=>c.checked=false);
    // إضافة زر إرسال بيانات الدخول بعد النجاح
    const msgEl = document.getElementById('nrv-msg');
    msgEl.innerHTML += ` <button class="btn btn-g btn-sm" style="margin-right:8px;margin-top:6px" onclick="sendCredentialsByEmail('${key}')">📧 إرسال بيانات الدخول للبريد</button>`;
  } catch(e) { showMsg('❗ فشل الحفظ: '+e.message, false); }
}

function copyEmailFromOverlay() {
  const d = window._emailData; if(!d) return;
  const btn = document.getElementById('copy-email-btn');
  const doSuccess = () => { btn.textContent='✅ تم النسخ!'; btn.style.background='#16a34a'; setTimeout(()=>{btn.textContent='📋 نسخ النص';btn.style.background='#374151';},2500); };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(d.text).then(doSuccess).catch(()=>fallbackCopy(d.text, doSuccess));
  } else { fallbackCopy(d.text, doSuccess); }
}

function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.cssText='position:fixed;left:-9999px;top:0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); cb(); } catch(e) {}
  document.body.removeChild(ta);
}

function openMailFromOverlay() {
  const d = window._emailData; if(!d) return;
  const sub = encodeURIComponent('بيانات الدخول - منصة ضمان الجودة | Login Credentials - Quality Assurance Platform - Jouf University');
  const body = encodeURIComponent(d.text);
  window.location.href = 'mailto:' + d.to + '?subject=' + sub + '&body=' + body;
}

}

// ─── items خاصة بالمراجع (معاييره فقط) ───
function rvItems() {
  const myCrits = CU.reviewerCriteria || [];
  return ALL_ITEMS.filter(it => {
    const mainNum = String(it.crit_idx + 1);
    return myCrits.includes(mainNum) || myCrits.includes(it.inst_crit_num?.split('.')[0]);
  });
}

function render_rv_home() {
  const items = rvItems();
  let pending=0, underReview=0, returned=0, completed=0;
  items.forEach(it => getReqStatus(it).forEach(r => {
    if(r.status==='pending') pending++;
    else if(r.status==='under_review') underReview++;
    else if(r.status==='returned') returned++;
    else if(r.status==='completed') completed++;
  }));

  // Update badge
  const bdg = document.getElementById('bdg-rv');
  if (bdg) bdg.textContent = underReview;

  const myCritNums = CU.reviewerCriteria || [];
  const myCritNames = INST_CRITERIA.filter(m=>myCritNums.includes(String(m.num))).map(m=>m.title);

  document.getElementById('rv-home').innerHTML = `
    <div class="ph"><div class="pht"><h1>نظرة عامة</h1>
      <p>معاييرك: ${myCritNames.join(' · ') || 'لم تُحدَّد معايير'}</p>
    </div></div>
    <div class="sr">
      <div class="sc" style="border-top:3px solid #065f46"><div class="ico">📤</div><div class="num">${items.length}</div><div class="lbl">إجمالي الإجراءات</div></div>
      <div class="sc" style="border-top:3px solid #b45309"><div class="ico">⏳</div><div class="num">${pending}</div><div class="lbl">قيد الاستكمال</div></div>
      <div class="sc" style="border-top:3px solid #2563eb"><div class="ico">🔵</div><div class="num">${underReview}</div><div class="lbl">قيد المراجعة</div></div>
      <div class="sc" style="border-top:3px solid #16a34a"><div class="ico">✅</div><div class="num">${completed}</div><div class="lbl">مكتمل</div></div>

function rvFillSubs() {
  const mi = document.getElementById('rv-main').value;
  const sel = document.getElementById('rv-sub');
  sel.innerHTML = '<option value="">— اختر —</option>';
  if (mi !== '') INST_CRITERIA[parseInt(mi)].subs.forEach((s,si)=>{ sel.innerHTML+=`<option value="${mi}-${si}">${s.num} — ${s.title}</option>`; });
  rvFillCritList();
}
function rvFillCritList() {
  const val = document.getElementById('rv-sub').value;
  const wrap = document.getElementById('rv-crit-wrap');
  const sel = document.getElementById('rv-crit');
  sel.innerHTML = '<option value="">— اختر —</option>';
  if (!val) { wrap.style.display='none'; rvFillReqs(); return; }
  const [mi,si]=val.split('-').map(Number);
  INST_CRITERIA[mi].subs[si].criteria.forEach(c=>{ sel.innerHTML+=`<option value="${c.num}">${c.num} — ${c.title}</option>`; });
  wrap.style.display='block'; rvFillReqs();
}
function rvFillReqs() {
  const num = document.getElementById('rv-crit').value;
  const wrap = document.getElementById('rv-reqs-wrap');
  const box  = document.getElementById('rv-reqs');
  if (!num) { wrap.style.display='none'; box.innerHTML=''; return; }
  const reqs = (INST_REQUIREMENTS[num]||[]).filter(r=>r&&r.trim());
  wrap.style.display='block';
  box.innerHTML = reqs.length
    ? reqs.map(r=>`<label style="display:flex;align-items:flex-start;gap:8px;padding:4px 0;font-size:12.5px;cursor:pointer;border-bottom:1px solid var(--bd)"><input type="checkbox" class="rv-req-chk" data-crit="${num}" data-title="${esc(findInstCriterion(num)?.title||'')}" value="${esc(r)}" checked style="margin-top:3px"><span>${esc(r)}</span></label>`).join('')
    : '<div style="font-size:11px;color:var(--mu)">لا توجد متطلبات محددة لهذا المحك</div>';
}
function rvClear() {
  document.getElementById('rv-main').value=''; rvFillSubs();
  document.getElementById('rv-agency').value=''; document.getElementById('rv-note').value='';
}
async function rvSend() {
  const mi=document.getElementById('rv-main').value, subVal=document.getElementById('rv-sub').value;
  const critNum=document.getElementById('rv-crit')?.value||'';
  const ag=document.getElementById('rv-agency').value, note=document.getElementById('rv-note').value.trim();
  if (!mi||!subVal||!ag)  { toast('❗ يرجى إكمال الحقول المطلوبة'); return; }
  if (!note)               { toast('❗ يرجى كتابة الملاحظات'); return; }
  if (!critNum)            { toast('❗ يرجى تحديد المحك'); return; }
  const [smi,ssi]=subVal.split('-').map(Number);
  const mainCrit=INST_CRITERIA[smi], subCrit=mainCrit.subs[ssi];
  const crit=findInstCriterion(critNum);
  const checkedReqs=Array.from(document.querySelectorAll('.rv-req-chk:checked')).map(c=>c.value);
  const selectedReqs=[{num:critNum, title:crit?.title||'', reqs:checkedReqs}];
  const item = {
    id:'p'+Date.now()+Math.random().toString(36).slice(2,5),
    crit_idx:smi, crit_title:`معيار ${mainCrit.num}: ${mainCrit.title}`,
    proc:`${subCrit.num} — ${subCrit.title}`,
    agency:ag, agency_name:AGS[ag].name,
    committee_note:note, committee_file:'',
    agency_file_note:'', agency_uploaded_at:'',
    agency_note:'', resubmit_count:0,
    status:'pending', final_note:'', decided_at:'',
    sent_at:new Date().toLocaleString('ar-SA'),
    inst_crit_num:critNum, inst_crit_title:crit?.title||'',
    inst_requirements:JSON.stringify(selectedReqs),
    req_status:JSON.stringify(selectedReqs[0].reqs.map(()=>({file:'',uploaded_at:'',agency_note:'',committee_note:'',status:'pending'}))),
    sent_by: CU.id, sent_by_name: CU.name
  };
  try {
    loading(true,'جاري الإرسال...');
    // رفع النموذج الاسترشادي إن وُجد
    const guideInp = document.getElementById('rv-guide-f');
    if (guideInp && guideInp.files[0]) {
      try {
        const gf = guideInp.files[0];
        const gext = gf.name.split('.').pop().toLowerCase().replace(/[^a-z0-9]/g,'');
        const gpath = `guides/${CU.id}/${item.id}_guide_${Date.now()}.${gext}`;
        item.committee_file = gf.name;
        item.committee_file_url = await sbUploadFile(gpath, gf);
      } catch(e) {}
    }
    await sbPost('procedures', item);
    await sbPost('activity_log', {msg:`[مراجع] إرسال إجراء "${item.proc}" إلى ${item.agency_name}`, actor:CU.name});
    await loadAll(); loading(false);
    rvClear(); render_rv_home();
    toast('✅ تم الإرسال إلى '+item.agency_name, true);
  } catch(e) { loading(false); toast('❗ فشل: '+e.message); }
}

async function rvDecide(itemId, idx, decision) {
  const note=(document.getElementById(`rvd-note-${itemId}-${idx}`)?.value||'').trim();
  const it=ALL_ITEMS.find(i=>i.id===itemId); if(!it) return;
  const rs=getReqStatus(it);
  const now = new Date().toISOString();
  const history = rs[idx].history || [];
  history.push({
    type: decision === 'completed' ? 'committee_complete' : 'committee_return',
    label: decision === 'completed' ? 'اعتماد العمادة' : 'إعادة للملاحظات',
    note: decision === 'returned' ? note : '',
    date: now,
    by: CU.name || CU.id
  });
  rs[idx].status=decision;
  rs[idx].committee_note=decision==='returned'?note:'';
  rs[idx].history=history;
  rs[idx].reviewed_by=CU.name;
  try {
    loading(true,'جاري حفظ القرار...');
    await sbPatch('procedures', itemId, {req_status:JSON.stringify(rs)});
    const label=decision==='completed'?'اعتماد':'إعادة للملاحظات';
    const reqs=getReqList(it);
    // إشعار للعمادة في سجل النشاط
    await sbPost('activity_log', {
      msg:`[مراجع — ${CU.name}] ${label}: "${reqs[idx]}" من إجراء "${it.proc}" (${it.agency_name})`,
      actor:CU.name
    });
    await loadAll(); loading(false);
    showScreen('rv-appr'); render_rv_appr(); render_rv_home();
    toast(decision==='completed'?'✅ تم اعتماد المتطلب':'↩ تم الإعادة للجهة', decision==='completed');
  } catch(e) { loading(false); toast('❗ فشل: '+e.message); }
}

function getFilterVals(id) {
  return {
    q:      (document.getElementById(id+'-q')?.value||'').trim().toLowerCase(),
    status: document.getElementById(id+'-status')?.value||'',
    agency: document.getElementById(id+'-agency')?.value||'',
    from:   document.getElementById(id+'-from')?.value||'',
    to:     document.getElementById(id+'-to')?.value||'',
  };
}

function applyFilters(rows, id) {
  const f = getFilterVals(id);
  return rows.filter(({it, idx, reqText, r, critLabel}) => {
    // نص البحث
    if (f.q) {
      const hay = [
        critLabel||'', reqText||'', it.proc||'', it.agency_name||'',
        it.crit_title||'', it.inst_crit_title||'', r.committee_note||'', r.agency_note||''
      ].join(' ').toLowerCase();
      if (!hay.includes(f.q)) return false;
    }
    // الحالة
    if (f.status && (r.status||'pending') !== f.status) return false;
    // الجهة
    if (f.agency && it.agency_name !== f.agency) return false;
    // التاريخ
    if (f.from || f.to) {
      const uploadedDate = r.uploaded_at ? r.uploaded_at.split('T')[0] : (it.sent_at ? it.sent_at.substring(0,10) : '');
      if (f.from && uploadedDate && uploadedDate < f.from) return false;
      if (f.to   && uploadedDate && uploadedDate > f.to)   return false;
    }
    return true;
  });
}

async function saveInitialPasswords() {
  try {
    const existing = await sbGet('settings', 'select=key');

    const toSave = [];

    // حفظ كلمات المرور
    Object.entries(USERS).forEach(([k,u]) => {

          updated_at: new Date().toISOString()
        }));
      }
    });

    // حفظ بيانات المستخدمين الأساسيين (أول مرة فقط)
    if (!savedKeys.has('base_users')) {

      Object.entries(USERS).forEach(([k,u]) => {

        key: 'base_users',

    }

    if (toSave.length) await Promise.all(toSave);

// ═══════════════════════════════════════════
//  تصدير التقارير (Excel/CSV + PDF بعلامة مائية)
// ═══════════════════════════════════════════
// يجمع بيانات التقرير حسب صلاحية الجهة الحالية
function collectReportData() {
  // تحديد الإجراءات المسموح بها حسب الدور
  let items = ALL_ITEMS.slice();
  if (CU.role === 'reviewer') {
    const myCrits = CU.reviewerCriteria || [];
    items = items.filter(it => {
      const mainNum = String(it.crit_idx + 1);
      return myCrits.includes(mainNum) || myCrits.includes(it.inst_crit_num?.split('.')[0]);
    });
  }

  // إحصائيات
  let totalReqs=0, pending=0, underReview=0, returned=0, completed=0;
  const rows = [];
  items.forEach(it => {
    const reqs = getReqList(it);
    const rs = getReqStatus(it);
    reqs.forEach((rq, i) => {
      const r = rs[i] || {status:'pending'};
      totalReqs++;
      if (r.status==='pending') pending++;
      else if (r.status==='under_review') underReview++;
      else if (r.status==='returned') returned++;
      else if (r.status==='completed') completed++;
      rows.push({
        criterion: it.crit_title || '—',
        subCriterion: (it.inst_crit_num||'') + ' — ' + (it.inst_crit_title||''),
        proc: it.proc || '—',
        agency: it.agency_name || '—',
        requirement: typeof rq==='string' ? rq : (rq.text||rq.name||'متطلب'),
        status: REQ_STX[r.status] || r.status,
        file: r.file || '—',
        uploadedAt: r.uploaded_at ? fmtDate(r.uploaded_at) : '—',
        note: (r.committee_note||r.agency_note||'').replace(/\n/g,' ')
      });
    });
  });

  // وكالات معتمدة من الوكيل
  let viceApproved = 0;
  Object.keys({...AGS, ...EXTRA_AGENCIES}).forEach(agKey => {
    if ((VICE_FLOW[agKey]||{}).stage === 'approved') viceApproved++;
  });

  return {
    rows,
    stats: {totalReqs, pending, underReview, returned, completed, viceApproved,
      procs: items.length,
      completionPct: totalReqs ? Math.round(completed/totalReqs*100) : 0}
  };
}

// اسم الجهة التي تُصدّر (للعلامة والترويسة)
function exporterName() {
  if (CU.role === 'admin') return 'مدير النظام';
  if (CU.role === 'committee') return 'عمادة التطوير والجودة';
  if (CU.role === 'reviewer') return CU.name || 'المراجع';
  if (CU.role === 'vice') return CU.name || 'الوكيل';
  return CU.name || 'النظام';
}

// ─── تصدير Excel (CSV بترميز يدعم العربي) ───
function exportReportCSV() {
  const {rows, stats} = collectReportData();
  const today = new Date().toLocaleDateString('ar-SA');
  const sep = ',';
  const esc = (v) => {
    v = String(v==null?'':v);
    if (v.includes('"')||v.includes(',')||v.includes('\n')) return '"'+v.replace(/"/g,'""')+'"';
    return v;
  };
  let csv = '';
  // ترويسة التقرير
  csv += esc('منصة ضمان الجودة — جامعة الجوف') + '\n';
  csv += esc('تقرير متابعة الإجراءات والمتطلبات') + '\n';
  csv += esc('الجهة المُصدِّرة: ' + exporterName()) + sep + esc('التاريخ: ' + today) + '\n';
  csv += '\n';
  // الملخص الإحصائي
  csv += esc('الملخص الإحصائي') + '\n';
  csv += esc('إجمالي الإجراءات') + sep + esc(stats.procs) + '\n';
  csv += esc('إجمالي المتطلبات') + sep + esc(stats.totalReqs) + '\n';
  csv += esc('مكتملة') + sep + esc(stats.completed) + '\n';
  csv += esc('قيد المراجعة') + sep + esc(stats.underReview) + '\n';
  csv += esc('معادة للملاحظات') + sep + esc(stats.returned) + '\n';
  csv += esc('غير مكتملة') + sep + esc(stats.pending) + '\n';
  csv += esc('وكالات معتمدة من الوكيل') + sep + esc(stats.viceApproved) + '\n';
  csv += esc('نسبة الإنجاز') + sep + esc(stats.completionPct + '%') + '\n';
  csv += '\n';
  // الجدول التفصيلي
  csv += [esc('المعيار'),esc('المعيار الفرعي'),esc('المحك'),esc('الجهة'),esc('المتطلب'),esc('الحالة'),esc('الملف'),esc('تاريخ الرفع'),esc('ملاحظات')].join(sep) + '\n';
  rows.forEach(r => {
    csv += [esc(r.criterion),esc(r.subCriterion),esc(r.proc),esc(r.agency),esc(r.requirement),esc(r.status),esc(r.file),esc(r.uploadedAt),esc(r.note)].join(sep) + '\n';
  });

  // BOM لدعم العربي في Excel
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `تقرير_الجودة_${today.replace(/\//g,'-')}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 3000);
  toast('✅ تم تصدير التقرير (Excel)', true);
}

// ─── تصدير PDF بعلامة مائية باسم الجهة المُصدِّرة ───
async function exportReportPDF() {
  const {rows, stats} = collectReportData();
  const today = new Date().toLocaleDateString('ar-SA');
  const exporter = exporterName();

  loading(true, 'جاري إنشاء التقرير...');
  try {
    if (typeof PDFLib === 'undefined') { loading(false); toast('مكتبة PDF غير متوفرة'); return; }

    // نرسم التقرير على canvas يدوياً (يعمل على HTTP دون SVG blob)
    const canvas = renderReportCanvas(rows, stats, exporter, today);

    const pdfDoc = await PDFLib.PDFDocument.create();
    const imgData = canvas.toDataURL('image/png');
    const png = await pdfDoc.embedPng(imgData);

    const pageW = 595, pageH = 842, margin = 24;
    const usableW = pageW - margin*2;
    const scale = usableW / canvas.width;
    const scaledFullH = canvas.height * scale;    // ارتفاع الصورة كاملة داخل الصفحة
    const usableH = pageH - margin*2;

    // علامة مائية
    const wmData = arabicTextToImage('تصدير: ' + exporter, 'منصة ضمان الجودة — ' + today);
    const wmPng = await pdfDoc.embedPng(wmData);

    // عدد الصفحات
    const pages = Math.max(1, Math.ceil(scaledFullH / usableH));
    for (let pIdx = 0; pIdx < pages; pIdx++) {
      const page = pdfDoc.addPage([pageW, pageH]);
      // نزيح الصورة لأعلى بمقدار الصفحة الحالية، ونثبّت الأعلى في أعلى المساحة القابلة للاستخدام
      const yTop = pageH - margin;                       // أعلى المساحة
      const imgTopY = yTop - scaledFullH + pIdx*usableH; // موضع أسفل الصورة
      page.drawImage(png, { x: margin, y: imgTopY, width: usableW, height: scaledFullH });
      // علامة مائية قطرية
      const wmW = Math.min(pageW*0.6, 360), wmH = wmW*(200/900);
      page.drawImage(wmPng, { x:(pageW-wmW)/2, y:(pageH-wmH)/2, width:wmW, height:wmH, rotate: PDFLib.degrees(30), opacity:0.85 });
    }

    const bytes = await pdfDoc.save();
    const blob = new Blob([bytes], {type:'application/pdf'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `تقرير_الجودة_${today.replace(/\//g,'-')}.pdf`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 4000);
    loading(false);
    toast('✅ تم تصدير التقرير (PDF) بعلامة مائية', true);
  } catch(e) {
    loading(false);
    console.error(e);
    toast('❗ تعذّر إنشاء PDF: '+e.message);
  }
}

// يرسم التقرير على canvas يدوياً (نصوص عربية + جدول) — يعمل على HTTP
function renderReportCanvas(rows, stats, exporter, today) {
  const W = 1000;
  const rowH = 34, headerH = 260, tableHeadH = 40;
  const H = headerH + tableHeadH + rows.length*rowH + 80;
  const canvas = document.createElement('canvas');
  const sc = 2;
  canvas.width = W*sc; canvas.height = H*sc;
  const ctx = canvas.getContext('2d');
  ctx.scale(sc, sc);
  ctx.textBaseline = 'middle';
  ctx.direction = 'rtl';

  // خلفية بيضاء
  ctx.fillStyle = '#fff'; ctx.fillRect(0,0,W,H);

  // ترويسة
  ctx.fillStyle = '#4c1d95';
  ctx.font = 'bold 30px Arial';
  ctx.textAlign = 'center';

  ctx.fillStyle = '#1e293b';
  ctx.font = '20px Arial';
  ctx.fillText('تقرير متابعة الإجراءات والمتطلبات', W/2, 80);
  ctx.fillStyle = '#64748b';
  ctx.font = '14px Arial';
  ctx.fillText(`الجهة المُصدِّرة: ${exporter}   •   التاريخ: ${today}`, W/2, 108);
  // خط فاصل
  ctx.strokeStyle = '#4c1d95'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(40,124); ctx.lineTo(W-40,124); ctx.stroke();

  // بطاقات إحصائية (صفّان)
  const cards = [
    ['إجمالي الإجراءات', stats.procs, '#4c1d95'],
    ['إجمالي المتطلبات', stats.totalReqs, '#7c3aed'],
    ['مكتملة', stats.completed, '#16a34a'],
    ['قيد المراجعة', stats.underReview, '#2563eb'],
    ['معادة', stats.returned, '#dc2626'],
    ['غير مكتملة', stats.pending, '#b45309'],
    ['وكالات معتمدة', stats.viceApproved, '#7c3aed'],
    ['نسبة الإنجاز', stats.completionPct+'%', '#16a34a'],
  ];
  const perRow = 4, cardW = (W-80-30)/perRow, cardH = 56, gapX = 10, gapY = 10;
  cards.forEach((c, i) => {
    const col = i % perRow, row = Math.floor(i/perRow);
    const x = 40 + col*(cardW+gapX);
    const y = 140 + row*(cardH+gapY);
    ctx.fillStyle = '#f8fafc';
    ctx.strokeStyle = '#e5e7eb'; ctx.lineWidth = 1;
    roundRect(ctx, x, y, cardW, cardH, 8); ctx.fill(); ctx.stroke();
    // شريط علوي ملوّن
    ctx.fillStyle = c[2]; roundRect(ctx, x, y, cardW, 4, 2); ctx.fill();
    ctx.fillStyle = c[2]; ctx.font = 'bold 22px Arial'; ctx.textAlign = 'center';
    ctx.fillText(String(c[1]), x+cardW/2, y+26);
    ctx.fillStyle = '#64748b'; ctx.font = '12px Arial';
    ctx.fillText(c[0], x+cardW/2, y+46);
  });

  // رأس الجدول
  let ty = headerH;
  const cols = [
    {t:'الجهة', w:200},
    {t:'المحك', w:230},
    {t:'المتطلب', w:230},
    {t:'الحالة', w:150},
    {t:'تاريخ الرفع', w:110},
  ];
  const tableX = 40, tableW = cols.reduce((s,c)=>s+c.w,0);
  ctx.fillStyle = '#4c1d95';
  roundRect(ctx, tableX, ty, tableW, tableHeadH, 4); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 13px Arial'; ctx.textAlign = 'right';
  let cx = tableX + tableW;
  cols.forEach(c => { cx -= c.w; ctx.fillText(c.t, cx + c.w - 10, ty + tableHeadH/2); });
  ty += tableHeadH;

  // صفوف
  ctx.font = '12px Arial';
  const trunc = (s, max) => { s=String(s||''); return s.length>max ? s.slice(0,max-1)+'…' : s; };
  rows.forEach((r, i) => {
    if (i % 2) { ctx.fillStyle = '#f8fafc'; ctx.fillRect(tableX, ty, tableW, rowH); }
    ctx.fillStyle = '#1e293b';
    let x = tableX + tableW;
    const vals = [trunc(r.agency,26), trunc(r.proc,30), trunc(r.requirement,30), trunc(r.status,18), trunc(r.uploadedAt,16)];
    cols.forEach((c, ci) => { x -= c.w; ctx.textAlign='right'; ctx.fillText(vals[ci], x + c.w - 10, ty + rowH/2); });
    ctx.strokeStyle = '#f1f5f9'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(tableX, ty+rowH); ctx.lineTo(tableX+tableW, ty+rowH); ctx.stroke();
    ty += rowH;
  });
  if (!rows.length) {
    ctx.fillStyle = '#94a3b8'; ctx.textAlign = 'center'; ctx.font = '14px Arial';
    ctx.fillText('لا توجد بيانات', W/2, ty+30);
  }

  return canvas;
}
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

// يرسم HTML على canvas باستخدام SVG foreignObject
async function htmlReportToCanvas(html) {
  return new Promise((resolve, reject) => {
    const width = 1080;
    // نقيس الارتفاع بوضع HTML في عنصر مؤقت
    const temp = document.createElement('div');
    temp.style.cssText = 'position:absolute;left:-9999px;top:0;width:1080px';
    temp.innerHTML = html;
    document.body.appendChild(temp);
    const height = temp.firstElementChild.offsetHeight + 80;
    document.body.removeChild(temp);

    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}">
      <foreignObject width="100%" height="100%">
        <div xmlns="http://www.w3.org/1999/xhtml">${html}</div>
      </foreignObject></svg>`;
    const blob = new Blob([svg], {type:'image/svg+xml;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const scale = 2;
      canvas.width = width*scale; canvas.height = height*scale;
      const ctx = canvas.getContext('2d');
      ctx.scale(scale, scale);
      ctx.fillStyle = '#fff'; ctx.fillRect(0,0,width,height);
      ctx.drawImage(img, 0, 0);
      URL.revokeObjectURL(url);
      resolve(canvas);
    };
    img.onerror = (e) => { URL.revokeObjectURL(url); reject(new Error('فشل رسم التقرير')); };
    img.src = url;
  });
}

// ترسم نصاً عربياً في canvas وتعيده كصورة PNG (data URL) — لتجاوز مشكلة الخط العربي في PDF
function arabicTextToImage(text, sub) {
  const scale = 3;
  const canvas = document.createElement('canvas');
  const W = 900, H = 200;
  canvas.width = W*scale; canvas.height = H*scale;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);
  ctx.clearRect(0,0,W,H);
  ctx.translate(W/2, H/2);
  // النص الرئيسي
  ctx.font = 'bold 44px Arial, "Segoe UI", Tahoma, sans-serif';
  ctx.fillStyle = 'rgba(124,58,237,0.28)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.direction = 'rtl';
  ctx.fillText(text, 0, -20);
  // النص الفرعي (التاريخ)
  if (sub) {
    ctx.font = '28px Arial, sans-serif';
    ctx.fillStyle = 'rgba(124,58,237,0.22)';
    ctx.fillText(sub, 0, 40);
  }
  return canvas.toDataURL('image/png');
}

async function downloadPdfWithWatermark(fileUrl, fileName, viceName) {
  try {
    if (typeof PDFLib === 'undefined') {
      // المكتبة غير متوفرة — تحميل الملف الأصلي
      window.open(fileUrl, '_blank');
      return;
    }
    loading(true, 'جاري إضافة ختم الاعتماد...');
    const resp = await fetch(fileUrl);
    const buf = await resp.arrayBuffer();
    const pdfDoc = await PDFLib.PDFDocument.load(buf, {ignoreEncryption:true});

    // صورة النص العربي
    const today = new Date().toLocaleDateString('ar-SA');
    const imgData = arabicTextToImage('اعتماد: ' + viceName, 'منصة ضمان الجودة — ' + today);
    const pngImage = await pdfDoc.embedPng(imgData);

    const pages = pdfDoc.getPages();
    pages.forEach(page => {
      const {width, height} = page.getSize();
      // نضع العلامة قطرياً في وسط الصفحة
      const imgW = Math.min(width*0.7, 420);
      const imgH = imgW * (200/900);
      page.drawImage(pngImage, {
        x: (width - imgW)/2,
        y: (height - imgH)/2,
        width: imgW,
        height: imgH,
        rotate: PDFLib.degrees(30),
        opacity: 0.9
      });
    });

    const bytes = await pdfDoc.save();
    const blob = new Blob([bytes], {type:'application/pdf'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (fileName||'document').replace(/\.pdf$/i,'') + '_معتمد.pdf';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 4000);
    loading(false);
    toast('✅ تم تحميل الملف مع ختم الاعتماد', true);
  } catch(e) {
    loading(false);
    console.error(e);
    // في حالة أي خطأ، افتح الملف الأصلي
    window.open(fileUrl, '_blank');
    toast('تم فتح الملف الأصلي (تعذّر إضافة الختم)');
  }
}

// دالة موحّدة: PDF يُختم، غيره يُفتح مباشرة
function smartDownload(fileUrl, fileName, viceName) {
  const isPdf = /\.pdf$/i.test(fileName||'') || /\.pdf(\?|$)/i.test(fileUrl||'');
  if (isPdf) {
    downloadPdfWithWatermark(fileUrl, fileName, viceName);
  } else {
    window.open(fileUrl, '_blank');
  }
}

// ═══════════════════════════════════════════
//  المراجع: طلبات تعديل الوكيل (تمرير للجهة)
// ═══════════════════════════════════════════
// الوكالات التي تخص معايير هذا المراجع وهي في مرحلة edit_reviewer
function rvVEditAgencies() {
  const myCrits = CU.reviewerCriteria || [];
  const allAgs = {...AGS, ...EXTRA_AGENCIES};
  const result = [];
  Object.keys(allAgs).forEach(agKey => {
    const fl = VICE_FLOW[agKey] || {};
    if (fl.stage !== 'edit_reviewer') return;
    // هل من بين المتطلبات المطلوب تعديلها ما يخص معايير هذا المراجع؟
    const editReqs = fl.edit_reqs || [];
    const mine = editReqs.filter(er => {
      const it = ALL_ITEMS.find(i => i.id === er.item);
      if (!it) return false;
      const mainNum = String(it.crit_idx + 1);
      return myCrits.includes(mainNum) || myCrits.includes(it.inst_crit_num?.split('.')[0]);
    });
    if (mine.length) result.push({agKey, ag:allAgs[agKey], fl, mine});
  });
  return result;
}

// المراجع يمرّر المتطلبات للجهة — تصبح returned (تصل الجهة عبر الآلية الموجودة)
async function reviewerForwardToAgency(agKey) {
  const allAgs = {...AGS, ...EXTRA_AGENCIES};
  const ag = allAgs[agKey] || {name:agKey};
  const fl = VICE_FLOW[agKey] || {};
  const rnote = prompt('ملاحظة المراجع للجهة (اختياري):', '');
  if (rnote === null) return;
  if (!confirm(`سيتم إرسال المتطلبات للجهة "${ag.name}" لتنفيذ التعديل. تأكيد؟`)) return;
  loading(true, 'جاري الإرسال للجهة...');
  try {
    const editReqs = fl.edit_reqs || [];
    const viceNote = fl.vice_note || '';
    // نجمّع حسب الإجراء ونحوّل المتطلبات إلى returned
    const byItem = {};
    editReqs.forEach(er => { (byItem[er.item] = byItem[er.item]||[]).push(er.idx); });
    for (const [itemId, idxs] of Object.entries(byItem)) {
      const it = ALL_ITEMS.find(i => i.id === itemId);
      if (!it) continue;
      const rs = getReqStatus(it);
      idxs.forEach(idx => {
        if (!rs[idx]) rs[idx] = {status:'pending'};
        const hist = rs[idx].history || [];
        const fullNote = `طلب تعديل من الوكيل: ${viceNote}${rnote?(' | ملاحظة المراجع: '+rnote):''}`;
        hist.push({type:'vice_edit_return', label:'إعادة للتعديل (طلب الوكيل)', note:fullNote, date:new Date().toISOString(), by:CU.name});
        rs[idx].history = hist;
        rs[idx].status = 'returned';
        rs[idx].committee_note = fullNote;
      });
      await sbPatch('procedures', itemId, {req_status: JSON.stringify(rs)});
    }
    const trail = fl.trail || [];
    trail.push({by:CU.name, role:'المراجع', note:rnote||'', date:new Date().toLocaleString('ar-SA')});
    VICE_FLOW[agKey] = {...fl, stage:'edit_agency', reviewer_note:rnote||'', trail};
    await saveViceFlow();
    await sbPost('activity_log', {msg:`المراجع أرسل متطلبات وكالة "${ag.name}" للجهة للتعديل${rnote?(' — '+rnote):''}`, actor:CU.name});
    await loadAll();
    loading(false);
    toast('📤 تم الإرسال للجهة للتعديل', true);
    render_rv_vedits();
  } catch(e) {
    loading(false);
    toast('❗ فشل: '+e.message);
  }
}

// حالة الوكالة بالنسبة للوكيل تُخزّن في settings تحت المفتاح vice_flow
// البنية: { academic: {stage:'', vice_note:'', decided_at:''}, ... }
// stage: '' (لسه)، 'sent' (أرسلتها العمادة للوكيل)، 'approved'، 'rejected'، 'edits'
async function loadViceFlow() {
  try {
    const s = await sbGet('settings', "select=*&key=eq.vice_flow");
    if (s && s.length) VICE_FLOW = JSON.parse(s[0].value) || {};
  } catch(e) { VICE_FLOW = {}; }
}
async function saveViceFlow() {
  try {
    await sbUpsert('settings', {key:'vice_flow', value:JSON.stringify(VICE_FLOW), updated_at:new Date().toISOString()});
  } catch(e) {}
}

// هل كل متطلبات هذه الوكالة مكتملة (اعتمدها المراجع)؟
function agencyAllCompleted(agKey) {
  const items = ALL_ITEMS.filter(i => i.agency === agKey);
  if (items.length === 0) return false;
  // كل متطلب في كل إجراء لازم يكون completed
  let hasAny = false;
  for (const it of items) {
    const rs = getReqStatus(it);
    for (const r of rs) {
      hasAny = true;
      if (r.status !== 'completed') return false;
    }
  }
  return hasAny;
}

// عدّاد المتطلبات في وكالة
function agencyStats(agKey) {
  const items = ALL_ITEMS.filter(i => i.agency === agKey);
  let total=0, completed=0;
  items.forEach(it => getReqStatus(it).forEach(r => { total++; if(r.status==='completed') completed++; }));
  return {total, completed, procs: items.length};
}

        <td>${fileLink}</td>
      </tr>`;
    });
    rows += `
      <div style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px;margin-bottom:12px">
        <div style="font-weight:800;font-size:13px;margin-bottom:8px;color:#1e293b">${it.proc}</div>
        <table style="width:100%;font-size:12px"><thead><tr style="color:var(--mu);font-size:11px"><th style="width:34px">تعديل</th><th style="text-align:right">المتطلب</th><th style="text-align:right">الملف</th></tr></thead><tbody>${reqRows}</tbody></table>
      </div>`;
  });

  el.innerHTML = `
    <div class="ph"><div class="pht"><h1>اعتماد الوكالة</h1><p>${ag.name} — ${st.completed}/${st.total} متطلب مكتمل</p></div></div>
    <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:13px;color:#1d4ed8;font-weight:700">راجع متطلبات الوكالة. للموافقة الكاملة اضغط "موافقة". ولطلب تعديل متطلبات معيّنة، علّم عليها في خانة "تعديل" ثم اضغط "طلب تعديل المحدد".</div>
    ${rows}
    <div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px;margin-top:16px">
      <label style="display:block;font-weight:700;font-size:13px;margin-bottom:6px">ملاحظات الوكيل <span style="color:#b45309;font-weight:400;font-size:11px">(مطلوبة عند طلب التعديل أو عدم الموافقة)</span></label>
      <textarea id="vc-note" class="fc" rows="3" placeholder="أضف ملاحظاتك هنا... (تُرسل مع المتطلبات المطلوب تعديلها)" style="width:100%;margin-bottom:14px"></textarea>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-g" style="background:var(--ok);color:#fff;flex:1;min-width:120px" onclick="viceApprove()">✅ موافقة كاملة</button>
        <button class="btn btn-g" style="background:#b45309;color:#fff;flex:1;min-width:120px" onclick="viceRequestEdits()">✏️ طلب تعديل المحدد</button>
        <button class="btn btn-g" style="background:#dc2626;color:#fff;flex:1;min-width:120px" onclick="viceReject()">❌ عدم موافقة</button>
      </div>
    </div>`;
}

// موافقة كاملة على الوكالة
async function viceApprove() {
  const agKey = CU.agency;
  const ag = (AGS[agKey] || EXTRA_AGENCIES[agKey] || {name:CU.name});
  const note = (document.getElementById('vc-note')?.value || '').trim();
  if (!confirm(`تأكيد الموافقة الكاملة على وكالة "${ag.name}"؟`)) return;
  loading(true, 'جاري حفظ القرار...');
  VICE_FLOW[agKey] = {stage:'approved', vice_note:note, decided_at:new Date().toLocaleString('ar-SA')};
  await saveViceFlow();
  await sbPost('activity_log', {msg:`الوكيل وافق على وكالة "${ag.name}"${note?(' — ملاحظات: '+note):''}`, actor:CU.name});
  await loadAll();
  loading(false);
  toast('✅ تم اعتماد الوكالة', true);
  showScreen('vc-home'); render_vc_home();
  document.querySelectorAll('#sidebar .sbi').forEach(s=>s.classList.remove('active'));
  document.querySelector('#sidebar .sbi').classList.add('active');
}

// عدم الموافقة (رفض) على الوكالة
async function viceReject() {
  const agKey = CU.agency;
  const ag = (AGS[agKey] || EXTRA_AGENCIES[agKey] || {name:CU.name});
  const note = (document.getElementById('vc-note')?.value || '').trim();
  if (!note) { alert('⚠️ يرجى كتابة سبب عدم الموافقة في خانة "ملاحظات الوكيل"'); document.getElementById('vc-note')?.focus(); return; }
  if (!confirm(`تأكيد عدم الموافقة على وكالة "${ag.name}"؟`)) return;
  loading(true, 'جاري حفظ القرار...');
  VICE_FLOW[agKey] = {stage:'rejected', vice_note:note, decided_at:new Date().toLocaleString('ar-SA')};
  await saveViceFlow();
  await sbPost('activity_log', {msg:`الوكيل لم يوافق على وكالة "${ag.name}" — السبب: ${note}`, actor:CU.name});
  await loadAll();
  loading(false);
  toast('❌ تم تسجيل عدم الموافقة');
  showScreen('vc-home'); render_vc_home();
  document.querySelectorAll('#sidebar .sbi').forEach(s=>s.classList.remove('active'));
  document.querySelector('#sidebar .sbi').classList.add('active');
}

// طلب تعديل متطلبات محددة — يبدأ التسلسل: وكيل ← عمادة ← مراجع ← جهة
async function viceRequestEdits() {
  const agKey = CU.agency;
  const ag = (AGS[agKey] || EXTRA_AGENCIES[agKey] || {name:CU.name});
  const note = (document.getElementById('vc-note')?.value || '').trim();
  const checks = Array.from(document.querySelectorAll('.vc-req-chk:checked'));
  if (checks.length === 0) { alert('⚠️ اختر أولاً المتطلبات المطلوب تعديلها (علّم في خانة "تعديل" بجانب كل متطلب)'); return; }
  if (!note) { alert('⚠️ يرجى كتابة ملاحظة في خانة "ملاحظات الوكيل" توضّح المطلوب تعديله — لأنها سترسل للجهة'); document.getElementById('vc-note')?.focus(); return; }
  if (!confirm(`سيتم إرسال ${checks.length} متطلب إلى عمادة التطوير والجودة لتمريرها للمراجع ثم الجهة للتعديل. تأكيد؟`)) return;

  loading(true, 'جاري إرسال طلب التعديل للعمادة...');
  try {
    // نخزّن قائمة المتطلبات المطلوب تعديلها (itemId + idx) في vice_flow
    const editReqs = checks.map(chk => ({
      item: chk.getAttribute('data-item'),
      idx: parseInt(chk.getAttribute('data-idx'))
    }));

    VICE_FLOW[agKey] = {
      stage: 'edit_committee',        // عند العمادة الآن
      vice_note: note,
      edit_reqs: editReqs,            // المتطلبات المطلوب تعديلها
      edit_count: checks.length,
      trail: [{by:CU.name, role:'الوكيل', note:note, date:new Date().toLocaleString('ar-SA')}],
      decided_at: new Date().toLocaleString('ar-SA')
    };
    await saveViceFlow();
    await sbPost('activity_log', {msg:`الوكيل طلب تعديل ${checks.length} متطلب في وكالة "${ag.name}" وأرسلها للعمادة — ${note}`, actor:CU.name});
    await loadAll();
    loading(false);
    toast('✏️ تم إرسال طلب التعديل إلى عمادة التطوير والجودة', true);
    showScreen('vc-home'); render_vc_home();
    document.querySelectorAll('#sidebar .sbi').forEach(s=>s.classList.remove('active'));
    document.querySelector('#sidebar .sbi').classList.add('active');
  } catch(e) {
    loading(false);
    toast('❗ فشل: '+e.message);
  }
}

function render_vc_track() {
  const agKey = CU.agency;
  const ag = (AGS[agKey] || EXTRA_AGENCIES[agKey] || {name:CU.name, color:'#4c1d95'});
  const items = ALL_ITEMS.filter(i => i.agency === agKey);
  let rows = '';
  items.forEach(it => {
    const reqs = getReqList(it);
    const rs = getReqStatus(it);
    reqs.forEach((rq, i) => {
      const r = rs[i] || {status:'pending'};
      rows += `<tr>
        <td style="font-size:11px">${it.proc}</td>
        <td style="font-size:11px">${typeof rq==='string'?rq:(rq.text||rq.name||'متطلب')}</td>
        <td style="font-size:11px">${REQ_STX[r.status]||r.status}</td>
      </tr>`;
    });
  });
  if (!rows) rows = '<tr><td colspan="3" style="text-align:center;color:var(--mu);padding:20px">لا توجد متطلبات</td></tr>';
  document.getElementById('vc-track').innerHTML = `
    <div class="ph"><div class="pht"><h1>متابعة المتطلبات</h1><p>${ag.name}</p></div></div>
    <div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px;overflow-x:auto">
      <table style="width:100%;font-size:12px"><thead><tr style="color:var(--mu);font-size:11px"><th style="text-align:right">الإجراء</th><th style="text-align:right">المتطلب</th><th style="text-align:right">الحالة</th></tr></thead><tbody>${rows}</tbody></table>
    </div>`;
}

function render_vc_log() {
  const agKey = CU.agency;
  const ag = (AGS[agKey] || EXTRA_AGENCIES[agKey] || {name:CU.name});
  const myLogs = ALL_LOGS.filter(l => (l.msg||'').includes(ag.name) || l.actor===CU.name);
  let rows = myLogs.slice(0,50).map(l => `<div style="padding:10px 0;border-bottom:1px solid #f1f5f9;font-size:12px"><span style="color:#1e293b">${l.msg}</span><br><span style="color:var(--mu);font-size:10px">${l.actor} — ${fmtDate(l.created_at)}</span></div>`).join('');
  if (!rows) rows = '<div style="text-align:center;color:var(--mu);padding:20px">لا يوجد نشاط</div>';
  document.getElementById('vc-log').innerHTML = `
    <div class="ph"><div class="pht"><h1>سجل النشاط</h1></div></div>
    <div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px">${rows}</div>`;
}

function render_vc_profile() {
  document.getElementById('vc-profile').innerHTML = `
    <div class="ph"><div class="pht"><h1>بياناتي وكلمة المرور</h1></div></div>
    <div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px;max-width:420px">
      <div style="margin-bottom:14px"><label style="display:block;font-size:12px;color:var(--mu);margin-bottom:4px">الاسم</label><div style="font-weight:700">${CU.name}</div></div>
      <label style="display:block;font-weight:700;font-size:13px;margin-bottom:6px">كلمة المرور الجديدة</label>
      <input type="password" id="vc-newpass" class="fc" placeholder="اترك فارغاً لعدم التغيير" style="width:100%;margin-bottom:12px">
      <button class="btn btn-g" style="background:var(--ok);color:#fff" onclick="viceChangePass()">حفظ كلمة المرور</button>
    </div>`;
}

async function viceChangePass() {
  const np = (document.getElementById('vc-newpass')?.value||'').trim();
  if (!np) { toast('أدخل كلمة مرور جديدة'); return; }
  loading(true,'جاري الحفظ...');
  try {
    CU.pass = np;
    if (USERS[CU.id]) USERS[CU.id].pass = np;
    await sbUpsert('settings', {key:'pass_'+CU.id, value:JSON.stringify({pass:np}), updated_at:new Date().toISOString()});
    loading(false); toast('✅ تم تغيير كلمة المرور', true);
    document.getElementById('vc-newpass').value='';
  } catch(e){ loading(false); toast('تعذّر الحفظ'); }
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
window.addEventListener('load', () => {
  // تطبيق اللغة المحفوظة وإدراج أزرار التبديل
  applyLangDir();
  const lb = document.getElementById('login-lang-btn');
  if (lb) lb.innerHTML = langBtnHtml();
  const tb = document.getElementById('topbar-lang-btn');
  if (tb) tb.innerHTML = langBtnHtml();
  // ترجمة عنوان الشريط العلوي
  if (LANG === 'en') {
    const tbt = document.getElementById('tb-title');
    if (tbt) tbt.innerHTML = `${t('منصة ضمان الجودة')}<small>${t('عمادة التطوير والجودة — جامعة الجوف')}</small>`;
  }
  // ترجمة عناصر صفحة الدخول الثابتة عند تحميلها
  if (LANG === 'en') translateLoginPage();

  // Splash screen — hide after 5 seconds
  // إخفاء صفحة الدخول أثناء شاشة التحميل
  const loginPage = document.getElementById('pg-login');
  if (loginPage) loginPage.style.visibility = 'hidden';

  setTimeout(() => {
    const splash = document.getElementById('pg-splash');
    if (splash) {
      splash.classList.add('fade-out');
      setTimeout(() => {
        splash.remove();
        if (loginPage) loginPage.style.visibility = 'visible';
      }, 800);
    }
  }, 5000);
  // الصفحة جاهزة — يتم الاتصال بقاعدة البيانات عند تسجيل الدخول
});
</script>
