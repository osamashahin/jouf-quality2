function addNewAgency() {
  const name  = document.getElementById('nag-name').value.trim();
  const key   = document.getElementById('nag-key').value.trim().toLowerCase().replace(/\s+/g,'_');
  const pass  = document.getElementById('nag-pass').value.trim();
  const icon  = document.getElementById('nag-icon').value;
  const color = document.getElementById('nag-color').value;
  const msg   = document.getElementById('nag-msg');

  const showMsg = (text, ok) => {
    msg.style.display='block';
    msg.style.background=ok?'var(--okb)':'var(--erb)';
    msg.style.color=ok?'var(--ok)':'var(--er)';
    msg.style.border=ok?'1px solid var(--okbrd)':'1px solid var(--erbrd)';
    msg.textContent=text;
  };

  if (!name||!key||!pass) { showMsg('❗ يرجى ملء الاسم والمفتاح وكلمة المرور', false); return; }
  if (!/^[a-z][a-z0-9_]*$/.test(key)) { showMsg('❗ المفتاح يجب أن يكون بالإنجليزية فقط (حروف وأرقام وشرطة سفلية)', false); return; }
  if (USERS[key]) { showMsg('❗ هذا المفتاح مستخدم بالفعل، اختر مفتاحاً آخر', false); return; }
  if (pass.length < 4) { showMsg('❗ كلمة المرور يجب أن تكون 4 أحرف على الأقل', false); return; }

  // Add to extra agencies and USERS
  const grad = `linear-gradient(135deg, ${color}dd, ${color})`;
  EXTRA_AGENCIES[key] = {name, icon, color};
  USERS[key] = {pass, name, role:'agency', agency:key, grad};

  sbPost('activity_log', {msg:`إضافة جهة جديدة: ${name} (مفتاح: ${key})`, actor:'عمادة التطوير والجودة'});
  // Save extra agencies permanently to Supabase
  const agToSave = {};
  Object.entries(EXTRA_AGENCIES).forEach(([k,ag]) => {
    agToSave[k] = {...ag, pass: USERS[k]?.pass||''};
  });
  sbUpsert('settings', {key:'extra_agencies', value:JSON.stringify(agToSave), updated_at:new Date().toISOString()})
    .catch(()=>{});

  showMsg(`✅ تمت إضافة "${name}" بشكل دائم — المفتاح: ${key} — كلمة المرور: ${pass}`, true);
  document.getElementById('nag-name').value='';
  document.getElementById('nag-key').value='';
  document.getElementById('nag-pass').value='';

  // Refresh selects in send form if visible
  const csA = document.getElementById('cs-a');
  if(csA) {
    const allAg = getAllAgencies();
    csA.innerHTML='<option value="">— اختر —</option>'+Object.entries(USERS).filter(([k])=>k!=='committee'&&k!=='admin').map(([k,u])=>`<option value="${u.agency||k}">${allAg[u.agency||k]?.icon||'🏢'} ${u.name}</option>`).join('');
  }
}

function removeAgency(key) {
  const u = USERS[key];
  if(!u) return;
  if(!confirm(`حذف جهة "${u.name}"؟ سيتم حذف جميع إجراءاتها أيضاً.`)) return;
  const agKey = u.agency || key;
  delete EXTRA_AGENCIES[agKey];
  delete USERS[key];
  // Remove their items from DB
  const toDelete = ALL_ITEMS.filter(i=>i.agency===agKey);
  Promise.all(toDelete.map(it=>sbDelete('procedures',it.id))).then(async ()=>{
    // Update saved extra agencies
    const agToSave = {};
    Object.entries(EXTRA_AGENCIES).forEach(([k,ag]) => {
      agToSave[k] = {...ag, pass: USERS[k]?.pass||''};
    });
    await sbUpsert('settings', {key:'extra_agencies', value:JSON.stringify(agToSave), updated_at:new Date().toISOString()})
      .catch(()=>{});
    return loadAll();
  }).then(()=>{
    render_c_agencies();
    toast(`تم حذف جهة "${u.name}"`);
  });
}

async function doClearAll() {
  const confirm_val = document.getElementById('clear-confirm')?.value.trim();
  if(confirm_val !== 'مسح') { toast('❗ اكتب كلمة "مسح" للتأكيد'); return; }
  if(!confirm(`حذف جميع الإجراءات (${ALL_ITEMS.length}) نهائياً من Supabase؟`)) return;
  loading(true, 'جاري مسح جميع الإجراءات...');
  try {
    await Promise.all(ALL_ITEMS.map(it => sbDelete('procedures', it.id)));
    await sbPost('activity_log', {msg:`مسح جميع الإجراءات (${ALL_ITEMS.length} إجراء)`, actor:'عمادة التطوير والجودة'});
    await loadAll(); loading(false);
    render_c_clear(); render_c_home();
    toast('✅ تم مسح جميع الإجراءات', true);
  } catch(e) { loading(false); toast('❗ فشل المسح: '+e.message); }
}

async function doClearByStatus(status) {
  const items = ALL_ITEMS.filter(i=>i.status===status);
  const labels = {approved:'المعتمدة', rejected:'المرجوعة', pending:'قيد الانتظار', uploaded:'جاهز للاعتماد'};
  if(!items.length) { toast('لا توجد إجراءات بهذه الحالة'); return; }
  if(!confirm(`حذف ${items.length} إجراء من ${labels[status]}؟`)) return;
  loading(true, 'جاري الحذف...');
  try {
    await Promise.all(items.map(it => sbDelete('procedures', it.id)));
    await sbPost('activity_log', {msg:`حذف ${items.length} إجراء (${labels[status]})`, actor:'عمادة التطوير والجودة'});
    await loadAll(); loading(false);
    render_c_clear(); render_c_home();
    toast(`✅ تم حذف ${items.length} إجراء من ${labels[status]}`, true);
  } catch(e) { loading(false); toast('❗ فشل الحذف: '+e.message); }
}

async function addReviewer() {
  const name = document.getElementById('nrv-name').value.trim();
  const key  = document.getElementById('nrv-key').value.trim().toLowerCase().replace(/\s+/g,'_');
  const pass = document.getElementById('nrv-pass').value.trim();
  const criteria = Array.from(document.querySelectorAll('.nrv-crit:checked')).map(c=>c.value);
  const msg = document.getElementById('nrv-msg');

  const showMsg = (t, ok) => {
    msg.style.display='block';
    msg.style.background=ok?'var(--okb)':'var(--erb)';
    msg.style.color=ok?'var(--ok)':'var(--er)';
    msg.style.border=ok?'1px solid var(--okbrd)':'1px solid var(--erbrd)';
    msg.textContent=t;
  };

  const email = document.getElementById('nrv-email').value.trim();
  if (!name||!email||!key||!pass) { showMsg('❗ يرجى ملء جميع الحقول', false); return; }
  if (!/^[a-z][a-z0-9_]*$/.test(key)) { showMsg('❗ المفتاح يجب أن يكون بالإنجليزية', false); return; }
  if (USERS[key])                { showMsg('❗ هذا المفتاح مستخدم بالفعل', false); return; }
  if (!criteria.length)          { showMsg('❗ يرجى تحديد معيار واحد على الأقل', false); return; }

  const grad = 'linear-gradient(135deg,#065f46,#059669)';
  REVIEWERS[key] = {name, email, pass, criteria, grad};
  USERS[key] = {pass, name, email, role:'reviewer', reviewerCriteria:criteria, grad};

  try {
    await sbUpsert('settings', {key:'reviewers', value:JSON.stringify(REVIEWERS), updated_at:new Date().toISOString()});
    await sbPost('activity_log', {msg:`إضافة مراجع جديد: ${name} (${key}) — معايير: ${criteria.join(', ')}`, actor:'عمادة التطوير والجودة'});
    showMsg(`✅ تمت إضافة المراجع "${name}"`, true);
    document.getElementById('nrv-name').value='';
    document.getElementById('nrv-email').value='';
    document.getElementById('nrv-key').value='';
    document.getElementById('nrv-pass').value='';
    document.querySelectorAll('.nrv-crit').forEach(c=>c.checked=false);
    // إضافة زر إرسال بيانات الدخول بعد النجاح
    const msgEl = document.getElementById('nrv-msg');
    msgEl.innerHTML += ` <button class="btn btn-g btn-sm" style="margin-right:8px;margin-top:6px" onclick="sendCredentialsByEmail('${key}')">📧 إرسال بيانات الدخول للبريد</button>`;
  } catch(e) { showMsg('❗ فشل الحفظ: '+e.message, false); }
}

function copyEmailFromOverlay() {
  const d = window._emailData; if(!d) return;
  const btn = document.getElementById('copy-email-btn');
  const doSuccess = () => { btn.textContent='✅ تم النسخ!'; btn.style.background='#16a34a'; setTimeout(()=>{btn.textContent='📋 نسخ النص';btn.style.background='#374151';},2500); };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(d.text).then(doSuccess).catch(()=>fallbackCopy(d.text, doSuccess));
  } else { fallbackCopy(d.text, doSuccess); }
}

function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.cssText='position:fixed;left:-9999px;top:0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); cb(); } catch(e) {}
  document.body.removeChild(ta);
}

function openMailFromOverlay() {
  const d = window._emailData; if(!d) return;
  const sub = encodeURIComponent('بيانات الدخول - نظام متابعة اعمال الجودة - جامعة الجوف');
  const body = encodeURIComponent(d.text);
  window.location.href = 'mailto:' + d.to + '?subject=' + sub + '&body=' + body;
}

function rvItems() {
  const myCrits = CU.reviewerCriteria || [];
  return ALL_ITEMS.filter(it => {
    const mainNum = String(it.crit_idx + 1);
    return myCrits.includes(mainNum) || myCrits.includes(it.inst_crit_num?.split('.')[0]);
  });
}

function render_rv_home() {
  const items = rvItems();
  let pending=0, underReview=0, returned=0, completed=0;
  items.forEach(it => getReqStatus(it).forEach(r => {
    if(r.status==='pending') pending++;
    else if(r.status==='under_review') underReview++;
    else if(r.status==='returned') returned++;
    else if(r.status==='completed') completed++;
  }));

  // Update badge
  const bdg = document.getElementById('bdg-rv');
  if (bdg) bdg.textContent = underReview;

  const myCritNums = CU.reviewerCriteria || [];
  const myCritNames = INST_CRITERIA.filter(m=>myCritNums.includes(String(m.num))).map(m=>m.title);

  document.getElementById('rv-home').innerHTML = `
    <div class="ph"><div class="pht"><h1>نظرة عامة</h1>

function rvFillSubs() {
  const mi = document.getElementById('rv-main').value;
  const sel = document.getElementById('rv-sub');
  sel.innerHTML = '<option value="">— اختر —</option>';
  if (mi !== '') INST_CRITERIA[parseInt(mi)].subs.forEach((s,si)=>{ sel.innerHTML+=`<option value="${mi}-${si}">${s.num} — ${s.title}</option>`; });
  rvFillCritList();
}
function rvFillCritList() {
  const val = document.getElementById('rv-sub').value;
  const wrap = document.getElementById('rv-crit-wrap');
  const sel = document.getElementById('rv-crit');
  sel.innerHTML = '<option value="">— اختر —</option>';
  if (!val) { wrap.style.display='none'; rvFillReqs(); return; }
  const [mi,si]=val.split('-').map(Number);
  INST_CRITERIA[mi].subs[si].criteria.forEach(c=>{ sel.innerHTML+=`<option value="${c.num}">${c.num} — ${c.title}</option>`; });
  wrap.style.display='block'; rvFillReqs();
}
function rvFillReqs() {
  const num = document.getElementById('rv-crit').value;
  const wrap = document.getElementById('rv-reqs-wrap');
  const box  = document.getElementById('rv-reqs');
  if (!num) { wrap.style.display='none'; box.innerHTML=''; return; }
  const reqs = (INST_REQUIREMENTS[num]||[]).filter(r=>r&&r.trim());
  wrap.style.display='block';
  box.innerHTML = reqs.length
    ? reqs.map(r=>`<label style="display:flex;align-items:flex-start;gap:8px;padding:4px 0;font-size:12.5px;cursor:pointer;border-bottom:1px solid var(--bd)"><input type="checkbox" class="rv-req-chk" data-crit="${num}" data-title="${esc(findInstCriterion(num)?.title||'')}" value="${esc(r)}" checked style="margin-top:3px"><span>${esc(r)}</span></label>`).join('')
    : '<div style="font-size:11px;color:var(--mu)">لا توجد متطلبات محددة لهذا المحك</div>';
}
function rvClear() {
  document.getElementById('rv-main').value=''; rvFillSubs();
  document.getElementById('rv-agency').value=''; document.getElementById('rv-note').value='';
}
async function rvSend() {
  const mi=document.getElementById('rv-main').value, subVal=document.getElementById('rv-sub').value;
  const critNum=document.getElementById('rv-crit')?.value||'';
  const ag=document.getElementById('rv-agency').value, note=document.getElementById('rv-note').value.trim();
  if (!mi||!subVal||!ag)  { toast('❗ يرجى إكمال الحقول المطلوبة'); return; }
  if (!note)               { toast('❗ يرجى كتابة الملاحظات'); return; }
  if (!critNum)            { toast('❗ يرجى تحديد المحك'); return; }
  const [smi,ssi]=subVal.split('-').map(Number);
  const mainCrit=INST_CRITERIA[smi], subCrit=mainCrit.subs[ssi];
  const crit=findInstCriterion(critNum);
  const checkedReqs=Array.from(document.querySelectorAll('.rv-req-chk:checked')).map(c=>c.value);
  const selectedReqs=[{num:critNum, title:crit?.title||'', reqs:checkedReqs}];
  const item = {
    id:'p'+Date.now()+Math.random().toString(36).slice(2,5),
    crit_idx:smi, crit_title:`معيار ${mainCrit.num}: ${mainCrit.title}`,
    proc:`${subCrit.num} — ${subCrit.title}`,
    agency:ag, agency_name:AGS[ag].name,
    committee_note:note, committee_file:'',
    agency_file_note:'', agency_uploaded_at:'',
    agency_note:'', resubmit_count:0,
    status:'pending', final_note:'', decided_at:'',
    sent_at:new Date().toLocaleString('ar-SA'),
    inst_crit_num:critNum, inst_crit_title:crit?.title||'',
    inst_requirements:JSON.stringify(selectedReqs),
    req_status:JSON.stringify(selectedReqs[0].reqs.map(()=>({file:'',uploaded_at:'',agency_note:'',committee_note:'',status:'pending'}))),
    sent_by: CU.id, sent_by_name: CU.name
  };
  try {
    loading(true,'جاري الإرسال...');
    // رفع النموذج الاسترشادي إن وُجد
    const guideInp = document.getElementById('rv-guide-f');
    if (guideInp && guideInp.files[0]) {
      try {
        const gf = guideInp.files[0];
        const gext = gf.name.split('.').pop().toLowerCase().replace(/[^a-z0-9]/g,'');
        const gpath = `guides/${CU.id}/${item.id}_guide_${Date.now()}.${gext}`;
        item.committee_file = gf.name;
        item.committee_file_url = await sbUploadFile(gpath, gf);
      } catch(e) {}
    }
    await sbPost('procedures', item);
    await sbPost('activity_log', {msg:`[مراجع] إرسال إجراء "${item.proc}" إلى ${item.agency_name}`, actor:CU.name});
    await loadAll(); loading(false);
    rvClear(); render_rv_home();
    toast('✅ تم الإرسال إلى '+item.agency_name, true);
  } catch(e) { loading(false); toast('❗ فشل: '+e.message); }
}

async function rvDecide(itemId, idx, decision) {
  const note=(document.getElementById(`rvd-note-${itemId}-${idx}`)?.value||'').trim();
  const it=ALL_ITEMS.find(i=>i.id===itemId); if(!it) return;
  const rs=getReqStatus(it);
  const now = new Date().toISOString();
  const history = rs[idx].history || [];
  history.push({
    type: decision === 'completed' ? 'committee_complete' : 'committee_return',
    label: decision === 'completed' ? 'اعتماد العمادة' : 'إعادة للملاحظات',
    note: decision === 'returned' ? note : '',
    date: now,
    by: CU.name || CU.id
  });
  rs[idx].status=decision;
  rs[idx].committee_note=decision==='returned'?note:'';
  rs[idx].history=history;
  rs[idx].reviewed_by=CU.name;
  try {
    loading(true,'جاري حفظ القرار...');
    await sbPatch('procedures', itemId, {req_status:JSON.stringify(rs)});
    const label=decision==='completed'?'اعتماد':'إعادة للملاحظات';
    const reqs=getReqList(it);
    // إشعار للعمادة في سجل النشاط
    await sbPost('activity_log', {
      msg:`[مراجع — ${CU.name}] ${label}: "${reqs[idx]}" من إجراء "${it.proc}" (${it.agency_name})`,
      actor:CU.name
    });
    await loadAll(); loading(false);
    showScreen('rv-appr'); render_rv_appr(); render_rv_home();
    toast(decision==='completed'?'✅ تم اعتماد المتطلب':'↩ تم الإعادة للجهة', decision==='completed');
  } catch(e) { loading(false); toast('❗ فشل: '+e.message); }
}

function rvFilterLog() {
  const q     = (document.getElementById('rvlog-q')?.value||'').toLowerCase();
  const actor = document.getElementById('rvlog-actor')?.value||'';
  const from  = document.getElementById('rvlog-from')?.value||'';
  const to    = document.getElementById('rvlog-to')?.value||'';
  const filtered = ALL_LOGS.filter(l => {
    if (q && !l.msg?.toLowerCase().includes(q) && !l.actor?.toLowerCase().includes(q)) return false;
    if (actor && l.actor !== actor) return false;
    const day = l.created_at ? l.created_at.split('T')[0] : '';
    if (from && day < from) return false;
    if (to   && day > to)   return false;
    return true;
  });
  const body = document.getElementById('rvlog-body');
  const cnt  = document.getElementById('rvlog-count');
  if (body) body.innerHTML = renderLogItems(filtered);
  if (cnt)  cnt.textContent = `${filtered.length} من ${ALL_LOGS.length} نشاط`;
}

function clearFilter(id, onchange) {
  document.getElementById(id+'-q').value='';
  document.getElementById(id+'-status').value='';
  document.getElementById(id+'-agency').value='';
  document.getElementById(id+'-from').value='';
  document.getElementById(id+'-to').value='';
  eval(onchange);
}

function getFilterVals(id) {
  return {
    q:      (document.getElementById(id+'-q')?.value||'').trim().toLowerCase(),
    status: document.getElementById(id+'-status')?.value||'',
    agency: document.getElementById(id+'-agency')?.value||'',
    from:   document.getElementById(id+'-from')?.value||'',
    to:     document.getElementById(id+'-to')?.value||'',
  };
}

function applyFilters(rows, id) {
  const f = getFilterVals(id);
  return rows.filter(({it, idx, reqText, r, critLabel}) => {
    // نص البحث
    if (f.q) {
      const hay = [
        critLabel||'', reqText||'', it.proc||'', it.agency_name||'',
        it.crit_title||'', it.inst_crit_title||'', r.committee_note||'', r.agency_note||''
      ].join(' ').toLowerCase();
      if (!hay.includes(f.q)) return false;
    }
    // الحالة
    if (f.status && (r.status||'pending') !== f.status) return false;
    // الجهة
    if (f.agency && it.agency_name !== f.agency) return false;
    // التاريخ
    if (f.from || f.to) {
      const uploadedDate = r.uploaded_at ? r.uploaded_at.split('T')[0] : (it.sent_at ? it.sent_at.substring(0,10) : '');
      if (f.from && uploadedDate && uploadedDate < f.from) return false;
      if (f.to   && uploadedDate && uploadedDate > f.to)   return false;
    }
    return true;
  });
}

function showFilterCount(id, filtered, total) {
  const el = document.getElementById(id+'-count');
  if (el) el.textContent = filtered < total ? `${filtered} نتيجة من أصل ${total}` : `${total} نتيجة`;
}

// ─── حفظ كلمات المرور الأصلية في Supabase عند أول دخول ───
async function saveInitialPasswords() {
  try {
    const existing = await sbGet('settings', 'select=key');
    const savedKeys = new Set((existing||[]).map(r=>r.key));
    const toSave = [];

    // حفظ كلمات المرور
    Object.entries(USERS).forEach(([k,u]) => {
      if (!savedKeys.has(`pass_${k}`)) {
        toSave.push(sbUpsert('settings', {
          key: `pass_${k}`,
          value: JSON.stringify({pass: u.pass}),
          updated_at: new Date().toISOString()
        }));
      }
    });

    // حفظ بيانات المستخدمين الأساسيين (أول مرة فقط)
    if (!savedKeys.has('base_users')) {
      const baseUsers = {};
      Object.entries(USERS).forEach(([k,u]) => {
        if (['committee','academic','main','postgrad','admin'].includes(k)) {
          baseUsers[k] = {name: u.name, role: u.role, agency: u.agency||'', grad: u.grad};
        }
      });
      toSave.push(sbUpsert('settings', {
        key: 'base_users',
        value: JSON.stringify(baseUsers),
        updated_at: new Date().toISOString()
      }));
    }

    if (toSave.length) await Promise.all(toSave);
  } catch(e) {}
}

    } else if (done) {

      <div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px;margin-bottom:14px">

async function committeeSendToVice(agKey) {
  const allAgs = {...AGS, ...EXTRA_AGENCIES};
  const ag = allAgs[agKey] || {name:agKey};
  const vu = viceUserFor(agKey);
  if (!vu) { toast('لا يوجد وكيل مرتبط بهذه الوكالة'); return; }

  VICE_FLOW[agKey] = {stage:'sent', vice_note:'', sent_at:new Date().toLocaleString('ar-SA')};

// هل كل متطلبات هذه الوكالة مكتملة (اعتمدها المراجع)؟
function agencyAllCompleted(agKey) {
  const items = ALL_ITEMS.filter(i => i.agency === agKey);
  if (items.length === 0) return false;
  // كل متطلب في كل إجراء لازم يكون completed
  let hasAny = false;
  for (const it of items) {
    const rs = getReqStatus(it);
    for (const r of rs) {
      hasAny = true;
      if (r.status !== 'completed') return false;
    }
  }
  return hasAny;
}

// عدّاد المتطلبات في وكالة
function agencyStats(agKey) {
  const items = ALL_ITEMS.filter(i => i.agency === agKey);
  let total=0, completed=0;
  items.forEach(it => getReqStatus(it).forEach(r => { total++; if(r.status==='completed') completed++; }));
  return {total, completed, procs: items.length};
}

    return;
  }

  // عرض ملخص كل الإجراءات والمتطلبات المكتملة للمراجعة
  const items = ALL_ITEMS.filter(i => i.agency === agKey);
  let rows = '';
  items.forEach(it => {
    const reqs = getReqList(it);
    const rs = getReqStatus(it);
    let reqRows = '';
    reqs.forEach((rq, i) => {
      const r = rs[i] || {};
      const fileLink = r.file ? `<a href="${r.file_url||'#'}" target="_blank" style="color:#1d4ed8;font-size:11px">⬇ ${r.file}</a>` : '<span style="color:var(--mu);font-size:11px">—</span>';
      reqRows += `<tr><td style="font-size:12px">${typeof rq==='string'?rq:(rq.text||rq.name||'متطلب')}</td><td>${fileLink}</td></tr>`;
    });
    rows += `
      <div style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px;margin-bottom:12px">
        <div style="font-weight:800;font-size:13px;margin-bottom:8px;color:#1e293b">${it.proc}</div>
        <table style="width:100%;font-size:12px"><thead><tr style="color:var(--mu);font-size:11px"><th style="text-align:right">المتطلب</th><th style="text-align:right">الملف</th></tr></thead><tbody>${reqRows}</tbody></table>
      </div>`;
  });

  el.innerHTML = `
    <div class="ph"><div class="pht"><h1>اعتماد الوكالة</h1><p>${ag.name} — ${st.completed}/${st.total} متطلب مكتمل</p></div></div>
    <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:13px;color:#1d4ed8;font-weight:700">راجع جميع متطلبات الوكالة أدناه، ثم اتخذ قرارك على الوكالة كاملة.</div>
    ${rows}
    <div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px;margin-top:16px">
      <label style="display:block;font-weight:700;font-size:13px;margin-bottom:6px">ملاحظات الوكيل (اختياري)</label>
      <textarea id="vc-note" class="fc" rows="3" placeholder="أضف ملاحظاتك هنا..." style="width:100%;margin-bottom:14px"></textarea>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-g" style="background:var(--ok);color:#fff;flex:1;min-width:120px" onclick="viceDecide('approved')">✅ موافقة</button>
        <button class="btn btn-g" style="background:#b45309;color:#fff;flex:1;min-width:120px" onclick="viceDecide('edits')">✏️ يحتاج تعديلات</button>
        <button class="btn btn-g" style="background:#dc2626;color:#fff;flex:1;min-width:120px" onclick="viceDecide('rejected')">❌ عدم موافقة</button>
      </div>
    </div>`;
}

async function viceDecide(decision) {
  const agKey = CU.agency;
  const ag = (AGS[agKey] || EXTRA_AGENCIES[agKey] || {name:CU.name});
  const note = (document.getElementById('vc-note')?.value || '').trim();
  const labels = {approved:'الموافقة على', edits:'طلب تعديلات على', rejected:'عدم الموافقة على'};
  if (!confirm(`تأكيد ${labels[decision]} وكالة "${ag.name}"؟`)) return;

  loading(true, 'جاري حفظ القرار...');
  VICE_FLOW[agKey] = {stage: decision, vice_note: note, decided_at: new Date().toLocaleString('ar-SA')};
  await saveViceFlow();
  const actionTxt = decision==='approved'?'وافق على':(decision==='edits'?'طلب تعديلات على':'لم يوافق على');
  await sbPost('activity_log', {msg:`الوكيل ${actionTxt} وكالة "${ag.name}"${note?(' — ملاحظات: '+note):''}`, actor:CU.name});
  await loadAll();
  await loadViceFlow();
  loading(false);
  toast(decision==='approved'?'✅ تم اعتماد الوكالة':(decision==='edits'?'✏️ طُلبت التعديلات':'❌ تم الرفض'), decision==='approved');
  showScreen('vc-home'); render_vc_home();
  document.querySelectorAll('#sidebar .sbi').forEach(s=>s.classList.remove('active'));
  document.querySelector('#sidebar .sbi').classList.add('active');
}

function render_vc_track() {
  const agKey = CU.agency;
  const ag = (AGS[agKey] || EXTRA_AGENCIES[agKey] || {name:CU.name, color:'#4c1d95'});
  const items = ALL_ITEMS.filter(i => i.agency === agKey);
  let rows = '';
  items.forEach(it => {
    const reqs = getReqList(it);
    const rs = getReqStatus(it);
    reqs.forEach((rq, i) => {
      const r = rs[i] || {status:'pending'};
      rows += `<tr>
        <td style="font-size:11px">${it.proc}</td>
        <td style="font-size:11px">${typeof rq==='string'?rq:(rq.text||rq.name||'متطلب')}</td>
        <td style="font-size:11px">${REQ_STX[r.status]||r.status}</td>
      </tr>`;
    });
  });
  if (!rows) rows = '<tr><td colspan="3" style="text-align:center;color:var(--mu);padding:20px">لا توجد متطلبات</td></tr>';
  document.getElementById('vc-track').innerHTML = `
    <div class="ph"><div class="pht"><h1>متابعة المتطلبات</h1><p>${ag.name}</p></div></div>
    <div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px;overflow-x:auto">
      <table style="width:100%;font-size:12px"><thead><tr style="color:var(--mu);font-size:11px"><th style="text-align:right">الإجراء</th><th style="text-align:right">المتطلب</th><th style="text-align:right">الحالة</th></tr></thead><tbody>${rows}</tbody></table>
    </div>`;
}

function render_vc_log() {
  const agKey = CU.agency;
  const ag = (AGS[agKey] || EXTRA_AGENCIES[agKey] || {name:CU.name});
  const myLogs = ALL_LOGS.filter(l => (l.msg||'').includes(ag.name) || l.actor===CU.name);
  let rows = myLogs.slice(0,50).map(l => `<div style="padding:10px 0;border-bottom:1px solid #f1f5f9;font-size:12px"><span style="color:#1e293b">${l.msg}</span><br><span style="color:var(--mu);font-size:10px">${l.actor} — ${fmtDate(l.created_at)}</span></div>`).join('');
  if (!rows) rows = '<div style="text-align:center;color:var(--mu);padding:20px">لا يوجد نشاط</div>';
  document.getElementById('vc-log').innerHTML = `
    <div class="ph"><div class="pht"><h1>سجل النشاط</h1></div></div>
    <div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px">${rows}</div>`;
}

function render_vc_profile() {
  document.getElementById('vc-profile').innerHTML = `
    <div class="ph"><div class="pht"><h1>بياناتي وكلمة المرور</h1></div></div>
    <div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px;max-width:420px">
      <div style="margin-bottom:14px"><label style="display:block;font-size:12px;color:var(--mu);margin-bottom:4px">الاسم</label><div style="font-weight:700">${CU.name}</div></div>
      <label style="display:block;font-weight:700;font-size:13px;margin-bottom:6px">كلمة المرور الجديدة</label>
      <input type="password" id="vc-newpass" class="fc" placeholder="اترك فارغاً لعدم التغيير" style="width:100%;margin-bottom:12px">
      <button class="btn btn-g" style="background:var(--ok);color:#fff" onclick="viceChangePass()">حفظ كلمة المرور</button>
    </div>`;
}

async function viceChangePass() {
  const np = (document.getElementById('vc-newpass')?.value||'').trim();
  if (!np) { toast('أدخل كلمة مرور جديدة'); return; }
  loading(true,'جاري الحفظ...');
  try {
    CU.pass = np;
    if (USERS[CU.id]) USERS[CU.id].pass = np;
    await sbUpsert('settings', {key:'pass_'+CU.id, value:JSON.stringify({pass:np}), updated_at:new Date().toISOString()});
    loading(false); toast('✅ تم تغيير كلمة المرور', true);
    document.getElementById('vc-newpass').value='';
  } catch(e){ loading(false); toast('تعذّر الحفظ'); }
}

window.addEventListener('load', () => {
  // Splash screen — hide after 5 seconds
  // إخفاء صفحة الدخول أثناء شاشة التحميل
  const loginPage = document.getElementById('pg-login');
  if (loginPage) loginPage.style.visibility = 'hidden';

  setTimeout(() => {
    const splash = document.getElementById('pg-splash');
    if (splash) {
      splash.classList.add('fade-out');
      setTimeout(() => {
        splash.remove();
        if (loginPage) loginPage.style.visibility = 'visible';
      }, 800);
    }
  }, 5000);
  // الصفحة جاهزة — يتم الاتصال بقاعدة البيانات عند تسجيل الدخول
});
</script>
