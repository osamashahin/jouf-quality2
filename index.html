<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>منصة ضمان الجودة — عمادة التطوير والجودة — جامعة الجوف</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#6b3fa0;--pd:#4a2878;--pb:#f0ebf8;--pbo:#d4c5e8;
  --ok:#16a34a;--okb:#f0fdf4;--okbrd:#bbf7d0;
  --wa:#b45309;--wab:#fffbeb;--wabrd:#fde68a;
  --er:#dc2626;--erb:#fef2f2;--erbrd:#fecaca;
  --bg:#f7f6fc;--sf:#fff;--bd:#e2ddf0;--tx:#1a1035;--mu:#7b6fa0;
  --acc:#6b3fa0;--accbg:#f0ebf8;
  --sh:0 1px 3px rgba(0,0,0,.07),0 4px 14px rgba(0,0,0,.05);
  --r:12px;
}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--tx);direction:rtl;font-size:14px;line-height:1.6;min-height:100vh}
.page{display:none;min-height:100vh}
.page.active{display:flex;flex-direction:column}

/* LOGIN */
#pg-login{background:#ece6ef;align-items:center;justify-content:center;position:relative;overflow-y:auto;overflow-x:hidden;padding:20px 0}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.3;animation:drift 12s ease-in-out infinite;pointer-events:none}
.orb1{width:500px;height:500px;background:#a070b8;top:-120px;right:-120px}
.orb2{width:400px;height:400px;background:#1d4ed8;bottom:-80px;left:-80px;animation-delay:-5s}
.orb3{width:280px;height:280px;background:#0891b2;top:40%;left:25%;animation-delay:-8s}
@keyframes drift{0%,100%{transform:translate(0,0)}33%{transform:translate(25px,-25px)}66%{transform:translate(-20px,20px)}}
#pg-login::before{content:'';position:fixed;inset:0;background-image:radial-gradient(rgba(255,255,255,.05) 1px,transparent 1px);background-size:32px 32px;z-index:0}
.lw{position:relative;z-index:10;width:100%;max-width:440px;padding:20px}
.lc{background:linear-gradient(160deg,#2a1540 0%,#5d3b72 50%,#7d4fa0 100%);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:36px 32px;box-shadow:0 20px 50px rgba(93,59,114,.45)}
.l-logo{text-align:center;margin-bottom:8px;width:95px;margin-left:auto;margin-right:auto;line-height:0}
.l-logo img{width:100%;height:auto;display:block;filter:brightness(0) invert(1)}
.l-title{font-size:19px;font-weight:800;color:#ffffff;text-align:center;margin-bottom:3px;text-shadow:0 2px 8px rgba(0,0,0,.3)}
.l-sub{font-size:11px;color:#ffffff;text-align:center;margin-bottom:22px;font-weight:600}
.div{height:1px;background:rgba(255,255,255,.1);margin:18px 0}
.lfg{margin-bottom:13px}
.ll{display:block;font-size:11px;font-weight:700;color:#ffffff;margin-bottom:5px;letter-spacing:.4px}
.li{width:100%;padding:11px 14px;border:1.5px solid rgba(255,255,255,.12);border-radius:10px;background:rgba(255,255,255,.07);color:#fff;font-family:'Cairo',sans-serif;font-size:13px;outline:none;direction:rtl;transition:border .2s}
.li::placeholder{color:rgba(255,255,255,.28)}
.li:focus{border-color:rgba(107,63,160,.8);background:rgba(107,63,160,.1)}
.pw{position:relative}.pw .li{padding-left:40px}
.eye{position:absolute;left:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(255,255,255,.4);font-size:16px;padding:0}
.eye:hover{color:rgba(255,255,255,.8)}
.btn-login{width:100%;padding:13px;margin-top:4px;background:linear-gradient(135deg,#6b3fa0,#4a2878);color:#fff;border:none;border-radius:10px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(107,63,160,.4)}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(107,63,160,.55)}
.btn-login:disabled{opacity:.6;pointer-events:none}
.err{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3);border-radius:8px;padding:9px 13px;font-size:12px;color:#fca5a5;margin-bottom:13px;display:none;align-items:center;gap:7px}
.err.show{display:flex}
.uh{margin-top:20px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:13px 15px}
.uht{font-size:10px;font-weight:700;color:rgba(255,255,255,.4);margin-bottom:9px;letter-spacing:.5px}
.uhr{display:flex;align-items:center;gap:9px;padding:6px 9px;border-radius:8px;cursor:pointer;transition:background .15s;margin-bottom:1px}
.uhr:hover{background:rgba(255,255,255,.07)}
.uhi{font-size:17px;width:26px;text-align:center;flex-shrink:0}
.uhn{font-size:12px;font-weight:700;color:rgba(255,255,255,.82)}
.uhr2{font-size:10px;color:rgba(255,255,255,.38)}
.uhc{font-size:10px;color:rgba(255,255,255,.3);font-family:monospace;margin-right:auto}
.lft{text-align:center;margin-top:16px;font-size:10px;color:rgba(255,255,255,.22)}

/* APP */
#pg-app{flex-direction:column}
.topbar{height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:200;flex-shrink:0}
.tb-brand{display:flex;align-items:center;gap:10px}
.tb-brand img{height:38px;filter:brightness(0) invert(1)}
.tb-title{font-size:13px;font-weight:700;color:#fff;line-height:1.3}
.tb-title small{font-size:10px;opacity:.7;display:block;font-weight:400}
.tb-right{display:flex;align-items:center;gap:8px}
.uchip{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:5px 13px;color:#fff;font-size:12px;font-weight:600}
.lout{background:rgba(220,38,38,.25);border:1px solid rgba(220,38,38,.4);color:#fff;border-radius:20px;padding:5px 13px;font-family:'Cairo',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:background .2s}
.lout:hover{background:rgba(220,38,38,.45)}
.abody{display:flex;flex:1;overflow:hidden;height:calc(100vh - 58px)}
.sidebar{width:210px;flex-shrink:0;background:var(--sf);border-left:1px solid var(--bd);overflow-y:auto;padding:10px 0}
.mc{flex:1;overflow-y:auto;padding:22px}
.sbg{padding:12px 14px 4px;font-size:9px;font-weight:800;color:var(--mu);letter-spacing:.8px;text-transform:uppercase}
.sbi{display:flex;align-items:center;gap:9px;padding:9px 14px;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--tx);border-right:3px solid transparent;transition:all .14s;user-select:none}
.sbi:hover{color:var(--acc);background:var(--accbg)}
.sbi.active{color:var(--acc);border-right-color:var(--acc);background:var(--accbg);font-weight:700}
.sbi svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.sbdg{margin-right:auto;min-width:18px;height:18px;border-radius:99px;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 5px;color:#fff}
.screen{display:none}.screen.active{display:block;animation:si .18s ease}
@keyframes si{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* COMPONENTS */
.ph{margin-bottom:18px;display:flex;justify-content:space-between;align-items:flex-start}
.pht h1{font-size:19px;font-weight:800}
.pht p{font-size:12px;color:var(--mu);margin-top:2px}
.sr{display:flex;gap:8px;margin-bottom:14px;flex-wrap:nowrap;overflow-x:auto}
.sc{background:#fff;border-radius:10px;padding:10px 12px;flex:1;min-width:100px;text-align:center;border:1px solid var(--bd)}
.sc .num{font-size:22px;font-weight:800;color:var(--dark);line-height:1}
.sc .lbl{font-size:10px;color:var(--mu);margin-top:3px}
.sc .ico{font-size:20px;margin-bottom:4px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;margin-bottom:14px;box-shadow:var(--sh)}
.ctit{font-size:13px;font-weight:700;margin-bottom:13px;display:flex;align-items:center;gap:7px}
.ctit svg{width:15px;height:15px;stroke:var(--acc);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tw{border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{background:var(--acc);color:#fff;padding:9px 11px;font-weight:700;font-size:11px;text-align:right}
.tbl td{padding:9px 11px;border-bottom:1px solid var(--bd);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#fafafa}
.bdg{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:10px;font-weight:700}
.bp{background:var(--wab);color:var(--wa)}
.bu{background:#f5f3ff;color:#7c3aed}
.ba{background:var(--okb);color:var(--ok)}
.br{background:var(--erb);color:var(--er)}
.bs{background:#eff6ff;color:#1d4ed8}
.fg{margin-bottom:13px}
.fl{font-size:11px;font-weight:700;color:var(--mu);margin-bottom:5px;display:block}
.fc{width:100%;padding:9px 12px;border:1.5px solid var(--bd);border-radius:8px;font-family:'Cairo',sans-serif;font-size:13px;color:var(--tx);background:#fff;outline:none;direction:rtl;transition:border .2s}
.fc:focus{border-color:var(--acc)}
textarea.fc{resize:vertical;min-height:75px}
.btn{padding:8px 18px;border-radius:8px;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all .18s}
.btn-p{background:var(--acc);color:#fff}.btn-p:hover{filter:brightness(1.1)}
.btn-ok{background:var(--ok);color:#fff}.btn-ok:hover{background:#15803d}
.btn-er{background:var(--er);color:#fff}.btn-er:hover{background:#b91c1c}
.btn-g{background:transparent;border:1.5px solid var(--bd);color:var(--mu)}.btn-g:hover{border-color:var(--acc);color:var(--acc)}
.btn-sm{padding:5px 12px;font-size:11px}
.notif{padding:10px 13px;border-radius:8px;font-size:12px;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px}
.ni{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.nw{background:var(--wab);color:var(--wa);border:1px solid var(--wabrd)}
.nok{background:var(--okb);color:var(--ok);border:1px solid var(--okbrd)}
.prog{height:7px;background:var(--bd);border-radius:99px;overflow:hidden;margin-top:5px}
.pf{height:100%;border-radius:99px;background:var(--acc);transition:width .6s}
.ic{background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--r);padding:16px 18px;margin-bottom:12px}
.ic.new{border-color:#fca5a5;background:#fffbfb}
.ic h4{font-size:13.5px;font-weight:700;margin-bottom:3px}
.ic .sub{font-size:11px;color:var(--mu)}
.uz{border:2px dashed var(--bd);border-radius:8px;padding:14px;text-align:center;cursor:pointer;font-size:12px;color:var(--mu);transition:all .2s;margin-bottom:10px}
.uz:hover{border-color:var(--acc);background:#faf8ff}
.uz.done{border-color:var(--ok);background:var(--okb);color:var(--ok);border-style:solid}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.cc{background:var(--sf);border:1.5px solid var(--bd);border-radius:10px;padding:13px 15px;cursor:pointer;transition:all .18s}
.cc:hover{border-color:var(--acc);transform:translateY(-1px);box-shadow:var(--sh)}
.cc h4{font-size:12.5px;font-weight:700;margin-bottom:5px}
.cc .meta{font-size:11px;color:var(--mu);margin-bottom:7px}
.chip{background:#f0edf9;color:#6b3fa0;font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600;display:inline-block;margin:2px}
.ar{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd);font-size:12px}
.ar:last-child{border-bottom:none}
.ad{width:8px;height:8px;border-radius:50%;background:var(--acc);flex-shrink:0;margin-top:5px}
.at{font-size:10px;color:var(--mu);white-space:nowrap;margin-right:auto;padding-right:8px}
.empty{text-align:center;padding:32px;color:var(--mu);font-size:13px}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--tx);color:#fff;padding:10px 22px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;transition:transform .28s;pointer-events:none;direction:rtl;box-shadow:0 4px 20px rgba(0,0,0,.2)}
#toast.show{transform:translateX(-50%) translateY(0)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-left:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.85);backdrop-filter:blur(4px);z-index:500;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.loading-overlay.show{display:flex}
.loading-overlay p{font-size:14px;font-weight:600;color:var(--pd)}

/* INSTITUTIONAL CRITERIA MANAGEMENT */
.im-main{background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.im-main-h{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;background:linear-gradient(135deg,#4a2878,#6b3fa0);color:#fff}
.im-main-h:hover{filter:brightness(1.05)}
.im-num{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0}
.im-title{flex:1;font-size:13.5px;font-weight:700}
.im-count{font-size:11px;background:rgba(255,255,255,.18);padding:3px 10px;border-radius:99px;font-weight:700}
.im-arrow{transition:transform .2s;font-size:11px}
.im-arrow.open{transform:rotate(90deg)}
.im-body{display:none;padding:10px 14px}
.im-body.open{display:block;animation:si .15s ease}
.im-edit-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:6px;padding:4px 9px;font-size:10px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;flex-shrink:0}
.im-edit-btn:hover{background:rgba(255,255,255,.3)}
.im-edit-btn.lite{background:var(--accbg);border:1px solid var(--pbo);color:var(--acc)}
.im-edit-btn.lite:hover{background:var(--pbo)}
.im-sub{border:1px solid var(--bd);border-radius:10px;margin-bottom:8px;overflow:hidden}
.im-sub-h{display:flex;align-items:center;gap:10px;padding:10px 13px;cursor:pointer;background:#faf8ff}
.im-sub-h:hover{background:var(--accbg)}
.im-sub-num{width:46px;text-align:center;font-size:11px;font-weight:800;color:var(--acc);background:#fff;border:1px solid var(--pbo);border-radius:6px;padding:3px 0;flex-shrink:0}
.im-sub-title{flex:1;font-size:12.5px;font-weight:700}
.im-sub-body{display:none;padding:8px 12px 10px}
.im-sub-body.open{display:block;animation:si .15s ease}
.im-crit{border:1px solid var(--bd);border-radius:9px;padding:10px 12px;margin-bottom:8px;background:#fff}
.im-crit-row{display:flex;align-items:flex-start;gap:9px;margin-bottom:8px}
.im-crit-num{width:54px;text-align:center;font-size:10px;font-weight:800;color:#6b3fa0;background:#f0ebf8;border-radius:6px;padding:3px 0;flex-shrink:0;margin-top:1px}
.im-crit-title{flex:1;font-size:12.5px;font-weight:600;line-height:1.5}
.im-req-box{border-top:1px dashed var(--bd);padding-top:8px;margin-top:4px}
.im-req-label{font-size:10.5px;font-weight:700;color:var(--mu);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.im-req-count{width:70px;padding:5px 8px;border:1.5px solid var(--bd);border-radius:6px;font-family:'Cairo',sans-serif;font-size:12px;text-align:center}
.im-req-count:focus{border-color:var(--acc);outline:none}
.im-req-item{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.im-req-item .req-no{width:22px;height:22px;border-radius:50%;background:var(--accbg);color:var(--acc);font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.im-req-item input{flex:1;padding:6px 9px;border:1.5px solid var(--bd);border-radius:6px;font-family:'Cairo',sans-serif;font-size:12px;direction:rtl}
.im-req-item input:focus{border-color:var(--acc);outline:none}
.im-edit-inline{display:flex;gap:6px;align-items:center;flex:1}
.im-edit-inline input{flex:1;padding:5px 9px;border:1.5px solid var(--acc);border-radius:6px;font-family:'Cairo',sans-serif;font-size:12.5px;direction:rtl;outline:none}

/* ═══ Splash Screen ═══ */
#pg-splash {
  position:fixed; inset:0; z-index:9999;
  background:linear-gradient(160deg,#3d1f4e 0%,#805896 50%,#3d1f4e 100%);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  transition:opacity 0.8s ease, visibility 0.8s ease;
}
#pg-splash.fade-out { opacity:0; visibility:hidden; pointer-events:none; }
.splash-logo { width:200px; max-width:55vw; animation:splashPop 0.7s cubic-bezier(.34,1.56,.64,1) both; }
.splash-bar-wrap { width:220px; height:4px; background:rgba(255,255,255,.2); border-radius:4px; margin-top:32px; overflow:hidden; }
.splash-bar { height:100%; width:0%; background:linear-gradient(90deg,#ece6ef,#fff); border-radius:4px; animation:splashFill 4.5s linear forwards; }
.splash-tagline { color:rgba(255,255,255,.75); font-size:13px; margin-top:14px; font-family:'Cairo',sans-serif; letter-spacing:1px; }
@keyframes splashPop { from{opacity:0;transform:scale(.8)} to{opacity:1;transform:scale(1)} }
@keyframes splashFill { 0%{width:0%} 90%{width:95%} 100%{width:100%} }
</style>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>



<!-- LOADING OVERLAY -->
<div class="loading-overlay" id="loading-overlay">
  <div style="width:40px;height:40px;border:3px solid #f0ebf8;border-top-color:#6b3fa0;border-radius:50%;animation:spin .8s linear infinite"></div>
  <p id="loading-msg">جاري الاتصال بقاعدة البيانات...</p>
</div>

async function sbPatch(table, id, data) {
  const r = await fetch(SB_URL+'/'+table+'?id=eq.'+id, {method:'PATCH',headers:{...SB_H,'Prefer':'return=minimal'},body:JSON.stringify(data)});
  if (r.status === 416) return [];
  if (!r.ok) throw new Error(await r.text());
}
async function sbDelete(table, id) {
  const r = await fetch(SB_URL+'/'+table+'?id=eq.'+id, {method:'DELETE',headers:SB_H});
  if (r.status === 416) return [];
  if (!r.ok) throw new Error(await r.text());
}
async function sbUpsert(table, data) {
  const r = await fetch(SB_URL+'/'+table, {
    method:'POST',
    headers:{...SB_H,'Prefer':'resolution=merge-duplicates,return=minimal'},
    body:JSON.stringify(data)
  });
  if (r.status === 416) return [];
  if (!r.ok) throw new Error(await r.text());
}

// ─── رفع ملف إلى Supabase Storage (bucket: requirements) ───
async function sbUploadFile(path, file) {
  const r = await fetch(`${SUPABASE_PROJECT_URL}/storage/v1/object/requirements/${path}`, {
    method: 'POST',
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': file.type || 'application/octet-stream',
      'x-upsert': 'true'
    },
    body: file
  });
  if (!r.ok) throw new Error(await r.text());
  return `${SUPABASE_PROJECT_URL}/storage/v1/object/public/requirements/${path}`;
}

async function sbDeleteAll(table) {
  // Delete all rows using a always-true filter
  const r = await fetch(SB_URL+'/'+table+'?id=gte.0', {method:'DELETE',headers:SB_H});
  if (!r.ok) {
    // For text primary keys
    const r2 = await fetch(SB_URL+'/'+table+'?created_at=gte.2000-01-01', {method:'DELETE',headers:SB_H});
    if (!r2.ok) throw new Error(await r2.text());
  }
}

function toast(m, ok) {
  const t = document.getElementById('toast');
  t.textContent = m;
  t.style.background = ok ? '#15803d' : '';
  t.classList.add('show');
  setTimeout(() => { t.classList.remove('show'); t.style.background=''; }, 2800);
}
function showPage(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function showScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); const el=document.getElementById(id); if(el) el.classList.add('active'); }
function sbAct(el) { document.querySelectorAll('.sbi').forEach(i=>i.classList.remove('active')); el.classList.add('active'); }
function loading(show, msg) { const o=document.getElementById('loading-overlay'); const m=document.getElementById('loading-msg'); if(m&&msg) m.textContent=msg; o.classList.toggle('show',show); }
function fmtDate(d) { return d ? new Date(d).toLocaleString('ar-SA') : '—'; }

async function loadAll() {
  const [items, logs, settings] = await Promise.all([
    sbGet('procedures', 'select=*&order=created_at.desc'),
    sbGet('activity_log', 'select=*&order=created_at.desc&limit=100'),
    sbGet('settings', 'select=*')
  ]);
  ALL_ITEMS = items || [];
  ALL_LOGS  = logs  || [];
  // Apply saved settings (passwords + extra agencies)
  if (settings && settings.length) {
    settings.forEach(s => {
      try {
        const val = JSON.parse(s.value);
        if (s.key === 'extra_agencies') {
          // Restore extra agencies
          Object.entries(val).forEach(([k, ag]) => {
            EXTRA_AGENCIES[k] = ag;
            if (!USERS[k]) {
              USERS[k] = {pass: ag.pass||'', name: ag.name, role:'agency', agency:k,
                grad:`linear-gradient(135deg,${ag.color}dd,${ag.color})`};
            }
          });
        } else if (s.key.startsWith('pass_')) {
          const userId = s.key.replace('pass_', '');
          if (USERS[userId]) USERS[userId].pass = val.pass;
        } else if (s.key === 'institutional_criteria') {
          INST_CRITERIA = val;
        } else if (s.key === 'institutional_requirements') {
          INST_REQUIREMENTS = val;
        } else if (s.key === 'reviewers') {
          REVIEWERS = val;
          Object.entries(val).forEach(([k, rv]) => {
            USERS[k] = {pass: rv.pass, name: rv.name, email: rv.email||'', role: 'reviewer',
              reviewerCriteria: rv.criteria || [],
              grad: rv.grad || 'linear-gradient(135deg,#065f46,#059669)'};
          });
        } else if (s.key === 'base_users') {
          // تحديث بيانات المستخدمين الأساسيين من قاعدة البيانات
          Object.entries(val).forEach(([k, u]) => {
            if (USERS[k]) {
              USERS[k].name = u.name;
              USERS[k].grad = u.grad;
            }
          });
        } else if (s.key === 'vice_flow') {
          VICE_FLOW = val || {};
        }
      } catch(e) {}
    });
  }
}

function refreshUI() {
  const a = document.querySelector('.screen.active');
  if (a && window['render_'+a.id]) window['render_'+a.id]();
  updateBadges();
}

function updateBadges() {
  const bw = document.getElementById('bdg-w');
  const ba = document.getElementById('bdg-a');
  const bn = document.getElementById('bdg-n');
  if (bw) bw.textContent = ALL_ITEMS.filter(i=>i.status==='pending').length;
  if (ba) {
    // عدد المتطلبات قيد المراجعة (لجميع الجهات) لإشعار العمادة
    let cnt = 0;
    ALL_ITEMS.forEach(it => getReqStatus(it).forEach(r => { if(r.status==='under_review') cnt++; }));
    ba.textContent = cnt;
  }
  if (bn && CU && CU.agency) {
    const mineItems = ALL_ITEMS.filter(i=>i.agency===CU.agency);
    bn.textContent = mineItems.filter(it => getReqStatus(it).some(r => r.status==='pending' || r.status==='returned')).length;
  }
}

function fill(u,p) { document.getElementById('usr').value=u; document.getElementById('pwd').value=p; document.getElementById('err').classList.remove('show'); }
function togglePwd() { const p=document.getElementById('pwd'); p.type=p.type==='password'?'text':'password'; }

async function doLogin() {
  const u=document.getElementById('usr').value.trim(), p=document.getElementById('pwd').value;
  const btn=document.getElementById('btn-login');
  document.getElementById('err').classList.remove('show');
  if(!u||!p) { showErr('يرجى إدخال اسم المستخدم وكلمة المرور'); return; }
  btn.innerHTML='جاري التحقق <span class="spinner"></span>'; btn.disabled=true;
  await new Promise(r=>setTimeout(r,500));
  const user=USERS[u];
  if(!user||user.pass!==p) {
    btn.innerHTML='دخول ←'; btn.disabled=false;
    showErr('اسم المستخدم أو كلمة المرور غير صحيحة');
    document.getElementById('pwd').value=''; return;
  }
  CU={id:u,...user};
  btn.innerHTML='✓ جاري الدخول...';
  await enterApp();
}

function showErr(m) { const b=document.getElementById('err'); document.getElementById('err-msg').textContent=m; b.classList.add('show'); }

function doLogout() {
  if(!confirm('تسجيل الخروج؟')) return;
  CU=null; if(refreshTimer) clearInterval(refreshTimer); ALL_ITEMS=[]; ALL_LOGS=[];
  document.getElementById('usr').value=''; document.getElementById('pwd').value='';
  document.getElementById('btn-login').innerHTML='دخول ←'; document.getElementById('btn-login').disabled=false;
  showPage('pg-login');
}

async function enterApp() {
  document.getElementById('topbar').style.background = CU.grad;
  document.getElementById('uchip').textContent = '👤 ' + CU.name;
  showPage('pg-app');
  loading(true, 'جاري تحميل البيانات...');
  try {
    await loadAll();
    // حفظ كلمات المرور الأصلية إن لم تكن محفوظة
    await saveInitialPasswords();
    loading(false);
    if(CU.role==='committee') buildCommittee();
    else if(CU.role==='admin') buildAdmin();
    else if(CU.role==='agency') buildAgency();
    else if(CU.role==='reviewer') buildReviewer();
    else if(CU.role==='vice') buildVice();
    if(refreshTimer) clearInterval(refreshTimer);
    refreshTimer = setInterval(async()=>{ await loadAll(); refreshUI(); }, 30000);
  } catch(e) {
    loading(false);
    document.getElementById('btn-login').innerHTML='دخول ←';
    document.getElementById('btn-login').disabled=false;
    showPage('pg-login');
    showErr('❗ فشل الاتصال بقاعدة البيانات: ' + e.message);
  }
}

// ─── بناء قائمة المعايير الرئيسية ───
function cBuildInstSelect() {
  const sel = document.getElementById('cs-main');
  if (!sel || sel.options.length > 1) return; // already built
  let html = '<option value="">— اختر —</option>';
  INST_CRITERIA.forEach((m, mi) => {
    html += `<option value="${mi}">معيار ${m.num}: ${m.title}</option>`;
  });
  sel.innerHTML = html;
}

// ─── عند اختيار المعيار الرئيسي، تعبئة المعايير الفرعية ───
function cFillSubs() {
  const mi = document.getElementById('cs-main').value;
  const sel = document.getElementById('cs-sub');
  sel.innerHTML = '<option value="">— اختر —</option>';
  if (mi === '') { cFillCritList(); return; }
  const m = INST_CRITERIA[parseInt(mi)];
  m.subs.forEach((sub, si) => {
    sel.innerHTML += `<option value="${mi}-${si}">${sub.num} — ${sub.title}</option>`;
  });
  cFillCritList();
}

// ─── إيجاد محك مؤسسي بالرقم ───
function findInstCriterion(num) {
  for (const m of INST_CRITERIA) {
    for (const sub of m.subs) {
      for (const c of sub.criteria) {
        if (c.num === num) return c;
      }
    }
  }
  return null;
}

// ─── عند اختيار المعيار الفرعي، تعبئة قائمة المحكات التابعة له ───
function cFillCritList() {
  const val = document.getElementById('cs-sub').value;
  const wrap = document.getElementById('cs-crit-wrap');
  const sel = document.getElementById('cs-crit');
  sel.innerHTML = '<option value="">— اختر —</option>';
  if (!val) { wrap.style.display = 'none'; cFillInstReqs(); return; }

  const [mi, si] = val.split('-').map(Number);
  const sub = INST_CRITERIA[mi].subs[si];

  if (!sub.criteria.length) { wrap.style.display = 'none'; cFillInstReqs(); return; }

  wrap.style.display = 'block';
  sub.criteria.forEach(c => {
    sel.innerHTML += `<option value="${c.num}">${c.num} — ${c.title}</option>`;
  });
  cFillInstReqs();
}

// ─── عند اختيار محك، عرض متطلباته كقائمة اختيار ───
function cFillInstReqs() {
  const num = document.getElementById('cs-crit').value;
  const wrap = document.getElementById('cs-inst-reqs-wrap');
  const box  = document.getElementById('cs-inst-reqs');
  if (!num) { wrap.style.display = 'none'; box.innerHTML = ''; return; }

  const c = findInstCriterion(num);
  const reqs = (INST_REQUIREMENTS[num] || []).filter(r => r && r.trim());

  wrap.style.display = 'block';
  if (!reqs.length) {
    box.innerHTML = '<div style="font-size:12px;color:var(--mu)">لا توجد متطلبات محددة لهذا المحك</div>';
    return;
  }

  box.innerHTML = reqs.map(r => `
    <label style="display:flex;align-items:flex-start;gap:8px;padding:4px 0;font-size:12.5px;cursor:pointer;border-bottom:1px solid var(--bd)">
      <input type="checkbox" class="cs-req-chk" data-crit="${num}" data-title="${esc(c?c.title:'')}" value="${esc(r)}" checked style="margin-top:3px">
      <span>${esc(r)}</span>
    </label>`).join('');
}

async function cSend() {
  const mi=document.getElementById('cs-main').value, subVal=document.getElementById('cs-sub').value;
  const critNum=document.getElementById('cs-crit')?.value || '';
  const ag=document.getElementById('cs-a').value, note=document.getElementById('cs-n').value.trim();
  const fi=document.getElementById('cs-f');
  if(mi===''||subVal===''||ag==='') { toast('❗ يرجى إكمال الحقول المطلوبة'); return; }
  if(!note) { toast('❗ يرجى كتابة الملاحظات للجهة'); return; }
  const hasCritOptions = document.getElementById('cs-crit') && document.getElementById('cs-crit').options.length > 1;
  if (hasCritOptions && critNum === '') { toast('❗ يرجى تحديد المحك'); return; }
  const fn = fi.files[0] ? fi.files[0].name : '';

  const [smi, ssi] = subVal.split('-').map(Number);
  const mainCrit = INST_CRITERIA[smi];
  const subCrit  = mainCrit.subs[ssi];

  // المحك المحدد ومتطلباته المحددة فقط
  let selectedReqs = [];
  if (critNum) {
    const crit = findInstCriterion(critNum);
    const checkedReqs = Array.from(document.querySelectorAll('.cs-req-chk:checked')).map(c => c.value);
    selectedReqs = [{num: critNum, title: crit ? crit.title : '', reqs: checkedReqs}];
  }

  const item = {
    id: 'p'+Date.now()+Math.random().toString(36).slice(2,5),
    crit_idx: smi, crit_title: `معيار ${mainCrit.num}: ${mainCrit.title}`,
    proc: `${subCrit.num} — ${subCrit.title}`,
    agency: ag, agency_name: AGS[ag].name,
    committee_note: note, committee_file: fn,
    agency_file_note: '', agency_uploaded_at: '',
    agency_note: '', resubmit_count: 0,
    status: 'pending', final_note: '', decided_at: '',
    sent_at: new Date().toLocaleString('ar-SA'),
    inst_crit_num: critNum || subCrit.num,
    inst_crit_title: critNum ? (findInstCriterion(critNum)?.title || '') : subCrit.title,
    inst_requirements: JSON.stringify(selectedReqs),
    req_status: JSON.stringify((selectedReqs[0]?.reqs||[]).map(() => ({file:'', uploaded_at:'', agency_note:'', committee_note:'', status:'pending'})))
  };
  try {
    loading(true, 'جاري الإرسال...');
    await sbPost('procedures', item);
    await sbPost('activity_log', {msg:`إرسال إجراء "${item.proc}" إلى ${item.agency_name}`, actor:'عمادة التطوير والجودة'});
    await loadAll(); loading(false);
    cClr(); updateBadges();
    toast('✓ تم الإرسال إلى '+item.agency_name, true);
  } catch(e) { loading(false); toast('❗ فشل الإرسال: '+e.message); }
}

function render_c_home() {
  // ── احتساب الإحصائيات ──
  let totalReqs=0, pendingR=0, underR=0, returnedR=0, completedR=0;
  ALL_ITEMS.forEach(it => getReqStatus(it).forEach(r => {
    totalReqs++;
    if(r.status==='pending')       pendingR++;
    else if(r.status==='under_review') underR++;
    else if(r.status==='returned')     returnedR++;
    else if(r.status==='completed')    completedR++;
  }));

  // إحصائيات كل معيار
  const critStats = INST_CRITERIA.map(m => {
    let total=0, done=0;
    ALL_ITEMS.filter(it => String(it.crit_idx+1) === String(m.num) ||
      (it.inst_crit_num && it.inst_crit_num.split('.')[0] === String(m.num))
    ).forEach(it => getReqStatus(it).forEach(r => {
      total++;
      if(r.status==='completed') done++;
    }));
    return {title: m.title, num: m.num, total, done, pct: total? Math.round(done/total*100):0};
  });

  // إحصائيات الجهات
  const allAgs = {...AGS, ...EXTRA_AGENCIES};
  const agStats = Object.entries(allAgs).map(([k,ag]) => {
    let p=0,u=0,r=0,c=0, total=0;
    ALL_ITEMS.filter(i=>i.agency===k).forEach(it => getReqStatus(it).forEach(x => {
      total++;
      if(x.status==='pending') p++;
      else if(x.status==='under_review') u++;
      else if(x.status==='returned') r++;
      else if(x.status==='completed') c++;
    }));
    const pct = total ? Math.round(c/total*100) : 0;
    return {k, name:ag.name, icon:ag.icon||'🏢', color:ag.color||'#6b3fa0', p,u,r,c,total,pct};
  }).filter(a=>a.total>0 || ALL_ITEMS.some(i=>i.agency===a.k));

  // رسم Donut Chart بـ SVG
  function donut(data, size=140) {
    const r=52, cx=70, cy=70, stroke=18;
    const total = data.reduce((s,d)=>s+d.v,0);
    if(!total) return `<svg width="${size}" height="${size}" viewBox="0 0 140 140"><circle cx="70" cy="70" r="52" fill="none" stroke="#e5e7eb" stroke-width="18"/><text x="70" y="76" text-anchor="middle" font-size="14" fill="#9ca3af" font-family="Cairo">لا بيانات</text></svg>`;
    let angle = -90;
    const slices = [];
    data.forEach(d => {
      if(!d.v) return;
      const pct = d.v/total;
      const startAngle = angle * Math.PI/180;
      const endAngle = (angle + pct*360) * Math.PI/180;
      const x1=cx+r*Math.cos(startAngle), y1=cy+r*Math.sin(startAngle);
      const x2=cx+r*Math.cos(endAngle),   y2=cy+r*Math.sin(endAngle);
      const large = pct>0.5?1:0;
      slices.push(`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z" fill="${d.c}" opacity="0.9"/>`);
      angle += pct*360;
    });
    // دائرة بيضاء مركزية لشكل Donut
    slices.push(`<circle cx="${cx}" cy="${cy}" r="${r-stroke}" fill="white"/>`);
    const mainLabel = data.reduce((p,c)=>c.v>p.v?c:p, data[0]);
    slices.push(`<text x="${cx}" y="${cy-6}" text-anchor="middle" font-size="18" font-weight="bold" fill="#1f2937" font-family="Cairo">${mainLabel.v}</text>`);
    slices.push(`<text x="${cx}" y="${cy+12}" text-anchor="middle" font-size="10" fill="#6b7280" font-family="Cairo">${mainLabel.l}</text>`);
    return `<svg width="${size}" height="${size}" viewBox="0 0 140 140">${slices.join('')}</svg>`;
  }

  // احتساب المتطلبات غير المرسلة (موجودة في المعايير لكن لم يُرسل بها إجراء)
  let totalExpectedReqs = 0;
  INST_CRITERIA.forEach(m => m.subs.forEach(s => s.criteria.forEach(c => {
    totalExpectedReqs += (INST_REQUIREMENTS[c.num]||[]).filter(r=>r&&r.trim()).length;
  })));
  const sentReqs = pendingR + underR + returnedR + completedR;
  const notSentR = Math.max(0, totalExpectedReqs - sentReqs);

  const reqDonutData = [
    {v:completedR, c:'#16a34a', l:'مكتمل'},
    {v:underR,     c:'#2563eb', l:'قيد المراجعة'},
    {v:returnedR,  c:'#dc2626', l:'معاد للملاحظات'},
    {v:pendingR,   c:'#d1d5db', l:'قيد الاستكمال'},
    {v:notSentR,   c:'#f3f4f6', l:'غير مرسل'},
  ];

  updateBadges();
  document.getElementById('c-home').innerHTML = `
    <div class="ph"><div class="pht"><h1>نظرة عامة</h1><p>عمادة التطوير والجودة — Supabase ☁</p></div>
    <button class="btn btn-g btn-sm" onclick="loadAll().then(()=>{render_c_home();toast('تم التحديث')})">🔄</button></div>

    <!-- إحصائيات سريعة -->

function imRenderReqItems(critNum, count) {
  const reqs = INST_REQUIREMENTS[critNum] || [];

    html += `<div class="im-req-item"><div class="req-no">${i+1}</div><input type="text" placeholder="اكتب المتطلب رقم ${i+1}..." value="${escAttr(val)}" data-crit="${critNum}" data-idx="${i}" class="im-req-input" oninput="imSetReqText('${critNum}',${i},this.value,true)"></div>`;
  }
  return html || '<div style="font-size:11px;color:var(--mu)">لم يتم تحديد عدد المتطلبات بعد</div>';
}

// حفظ فوري ومؤكد لمتطلبات محك معيّن
function imSaveReqs(critNum) {
  // اقرأ القيم الحالية من الحقول مباشرة لضمان عدم ضياع آخر تعديل
  const inputs = document.querySelectorAll(`.im-req-input[data-crit="${critNum}"]`);
  if (!INST_REQUIREMENTS[critNum]) INST_REQUIREMENTS[critNum] = [];
  inputs.forEach(inp => {
    const idx = parseInt(inp.dataset.idx);
    INST_REQUIREMENTS[critNum][idx] = inp.value;
  });

  // اقرأ "عدد المتطلبات" الحالي من الحقل وحدّث reqCount في INST_CRITERIA أيضاً
  const countInput = document.getElementById('im-reqcount-'+critNum);
  const crit = imFindCrit(critNum);
  if (crit && countInput) {
    let n = parseInt(countInput.value);
    if (isNaN(n) || n < 0) n = 0;
    if (n > 50) n = 50;
    crit.reqCount = n;
    // قصّ المتطلبات الزائدة إن قُلِّل العدد
    if (INST_REQUIREMENTS[critNum].length > n) INST_REQUIREMENTS[critNum] = INST_REQUIREMENTS[critNum].slice(0, n);
  }

  // حفظ فوري لكلا الإعدادين معاً (المعايير والمتطلبات)
  Promise.all([
    sbUpsert('settings', {key:'institutional_criteria', value:JSON.stringify(INST_CRITERIA), updated_at:new Date().toISOString()}),
    sbUpsert('settings', {key:'institutional_requirements', value:JSON.stringify(INST_REQUIREMENTS), updated_at:new Date().toISOString()})
  ])
    .then(() => {
      const ind = document.getElementById('im-saved-'+critNum);
      if (ind) { ind.style.display='inline'; setTimeout(()=>{ind.style.display='none';}, 2500); }
      toast('✓ تم حفظ متطلبات المحك '+critNum+' بشكل دائم', true);
    })
    .catch(e => toast('❗ فشل الحفظ: '+e.message));
}

function imSetReqCount(critNum, value) {
  let n = parseInt(value);
  if (isNaN(n) || n < 0) n = 0;
  if (n > 50) n = 50;
  const crit = imFindCrit(critNum);
  if (crit) crit.reqCount = n;
  if (!INST_REQUIREMENTS[critNum]) INST_REQUIREMENTS[critNum] = [];

  document.getElementById('im-req-items-'+critNum).innerHTML = imRenderReqItems(critNum, n);
  instSave();

function imSetReqText(critNum, idx, val, silent) {
  if (!INST_REQUIREMENTS[critNum]) INST_REQUIREMENTS[critNum] = [];
  INST_REQUIREMENTS[critNum][idx] = val;
  instSave(); // حفظ تلقائي مؤجَّل كنسخة احتياطية بصمت
}

function imFindSub(subNum) {
  for (const m of INST_CRITERIA) {
    const s = m.subs.find(x=>x.num===subNum);
    if (s) return s;

  return null;
}

function imFindCrit(critNum) {
  for (const m of INST_CRITERIA) {
    for (const s of m.subs) {
      const c = s.criteria.find(x=>x.num===critNum);
      if (c) return c;
    }
  }
  return null;
}

async function cDecideReq(itemId, idx, decision) {
  const noteEl = document.getElementById(`crd-note-${itemId}-${idx}`);
  const note = noteEl ? noteEl.value.trim() : '';
  const it = ALL_ITEMS.find(i => i.id === itemId);
  if (!it) return;
  const rs = getReqStatus(it);
  const decNow = new Date().toISOString();
  const decHistory = rs[idx].history || [];
  decHistory.push({type:decision==='completed'?'committee_complete':'committee_return',
    label:decision==='completed'?'اعتماد':'إعادة للملاحظات',
    note:decision==='returned'?note:'', date:decNow, by:CU.name||CU.id});
  rs[idx].history = decHistory;
  rs[idx].status = decision;
  rs[idx].committee_note = decision === 'returned' ? note : '';

  try {
    loading(true, 'جاري حفظ القرار...');
    await sbPatch('procedures', itemId, {req_status: JSON.stringify(rs)});
    const reqs = getReqList(it);
    const label = decision === 'completed' ? 'اعتماد' : 'إعادة للملاحظات';
    await sbPost('activity_log', {msg:`${label}: "${reqs[idx]}" — "${it.proc}" (${it.agency_name})`, actor:'عمادة التطوير والجودة'});
    await loadAll(); loading(false);
    showScreen('c-appr'); render_c_appr(); render_c_home();
    toast(decision === 'completed' ? '✅ تم اعتماد المتطلب كمكتمل' : '↩ تم إعادة المتطلب للجهة مع الملاحظات', decision==='completed');
  } catch(e) { loading(false); toast('❗ فشل: '+e.message); }
}

// ─── متابعة الإجراءات: التاريخ الكامل لكل متطلب ───
function render_c_track() {
  // بناء صفوف الجدول — كل إجراء (محك) في سطر واحد
  const rows = [];
  ALL_ITEMS.forEach(it => {
    const reqs   = getReqList(it);
    const rs     = getReqStatus(it);
    const critLabel = it.inst_crit_num ? `${it.inst_crit_num} — ${it.inst_crit_title}` : it.proc;
    // إحصاء حالات متطلبات هذا الإجراء
    let p=0,u=0,r=0,c=0;
    rs.forEach(x => {
      if(x.status==='pending')       p++;
      else if(x.status==='under_review') u++;
      else if(x.status==='returned')     r++;
      else if(x.status==='completed')    c++;
    });
    const total = reqs.length;
    const overallStatus = c===total&&total>0?'completed':u>0?'under_review':r>0?'returned':'pending';
    rows.push({it, reqs, rs, critLabel, p, u, r, c, total, overallStatus});

  document.getElementById('c-track').innerHTML = `

        <th>المعيار الفرعي</th>

        <th>الجهة</th>

        <th>المتطلبات</th>

        <th>عرض</th>

        let badge='';

        else if(overallStatus==='under_review') badge='<span class="bdg bu">🔵 قيد المراجعة</span>';
        else if(overallStatus==='returned')     badge='<span class="bdg br">↩ معاد للملاحظات</span>';

          <td style="font-size:11px">
            <span title="مكتمل" class="bdg ba" style="font-size:10px">✅ ${c}</span>

//  عرض التسلسل الزمني الكامل للمتطلب
// ═══════════════════════════════════════════
function renderReqTimeline(r, reqText, idx) {
  const history = r.history || [];
  const status = r.status || 'pending';

  // لون الحدود حسب الحالة
  const borderColor = status==='completed'?'#16a34a':status==='returned'?'#dc2626':status==='under_review'?'#2563eb':'#e5e7eb';

  let badge = '';
  if(status==='pending')       badge='<span class="bdg bs">⬜ قيد الاستكمال</span>';
  else if(status==='under_review') badge='<span class="bdg bu">🔵 قيد المراجعة</span>';
  else if(status==='returned')     badge='<span class="bdg br">↩ معاد للملاحظات</span>';
  else if(status==='completed')    badge='<span class="bdg ba">✅ مكتمل</span>';

  // بناء التسلسل الزمني
  const timelineHtml = history.length ? `
    <div style="margin-top:12px">
      <div style="font-size:11px;font-weight:700;color:var(--mu);margin-bottom:8px;text-transform:uppercase">📅 التسلسل الزمني</div>
      ${history.map((ev, ei) => {
        const isAgency = ev.type === 'agency_upload';
        const isComplete = ev.type === 'committee_complete';
        const isReturn = ev.type === 'committee_return';
        const dotColor = isAgency?'#2563eb':isComplete?'#16a34a':'#dc2626';
        const bgColor  = isAgency?'#eff6ff':isComplete?'#f0fdf4':'#fef2f2';
        const bdColor  = isAgency?'#bfdbfe':isComplete?'#bbf7d0':'#fecaca';
        return `
          <div style="display:flex;gap:10px;margin-bottom:8px">
            <div style="display:flex;flex-direction:column;align-items:center">
              <div style="width:12px;height:12px;border-radius:50%;background:${dotColor};margin-top:3px;flex-shrink:0"></div>
              ${ei<history.length-1?`<div style="width:2px;flex:1;background:#e5e7eb;margin:3px 0"></div>`:''}
            </div>
            <div style="flex:1;background:${bgColor};border:1px solid ${bdColor};border-radius:8px;padding:8px 12px;font-size:12px">
              <div style="display:flex;justify-content:space-between;margin-bottom:4px">
                <strong>${ev.label}</strong>
                <span style="color:var(--mu);font-size:10px">${fmtDate(ev.date)} · ${ev.by||''}</span>
              </div>
              ${ev.file?`<div style="margin-top:4px">
                <a href="${ev.file_url||'#'}" target="_blank" class="btn btn-g btn-sm"
                   style="font-size:10.5px;${!ev.file_url?'opacity:0.5;pointer-events:none':''}">
                   ⬇ ${ev.file}</a>
              </div>`:''}
              ${ev.note?`<div style="margin-top:4px;color:${isReturn?'#b91c1c':'#15803d'}">${ev.note}</div>`:''}
            </div>
          </div>`;
      }).join('')}
    </div>` : '';

  // بناء قائمة الملفات (القديمة + الحالية) للإجراءات التي لا تحتوي على history بعد
  const legacyFiles = [];
  (r.file_history||[]).forEach((fh,fi)=>{
    legacyFiles.push(`<a href="${fh.file_url||'#'}" target="_blank" class="btn btn-g btn-sm"
      style="font-size:10.5px;margin-bottom:4px;${!fh.file_url?'opacity:0.5;pointer-events:none':''}">
      ⬇ ملف ${fi+1} (سابق): ${fh.file}
      <span style="color:var(--mu);font-size:9px;margin-right:4px">${fmtDate(fh.uploaded_at)}</span>
    </a>`);
  });
  if(r.file) legacyFiles.push(`<a href="${r.file_url||'#'}" target="_blank" class="btn btn-g btn-sm"
    style="font-size:10.5px;${!r.file_url?'opacity:0.5;pointer-events:none':''}">
    ⬇ ${status==='completed'?'الملف المعتمد ✅':'الملف الحالي'}: ${r.file}
    <span style="color:var(--mu);font-size:9px;margin-right:4px">${fmtDate(r.uploaded_at)}</span>
  </a>`);
  const legacyFilesHtml = legacyFiles.length ?
    `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">${legacyFiles.join('')}</div>` : '';

  return `
    <div style="border:1px solid var(--bd);border-right:4px solid ${borderColor};border-radius:8px;padding:12px 14px;margin-bottom:10px;background:#fff">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
        <div style="font-size:13px;font-weight:700">📋 المتطلب ${idx+1}: ${reqText}</div>
        ${badge}
      </div>
      ${r.agency_note?`<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;padding:6px 10px;font-size:11.5px;margin-bottom:6px"><strong style="color:#15803d">💬 ملاحظة الجهة:</strong> ${r.agency_note}</div>`:''}
      ${r.committee_note?`<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:6px;padding:6px 10px;font-size:11.5px;margin-bottom:6px"><strong style="color:#b91c1c">↩ ملاحظة العمادة:</strong> ${r.committee_note}</div>`:''}
      ${r.reviewed_by?`<div style="font-size:10.5px;color:#065f46;margin-bottom:4px">👤 راجعه: ${r.reviewed_by}</div>`:''}
      ${history.length ? timelineHtml : legacyFilesHtml}
      ${!history.length && !r.file && status==='pending'?'<div style="font-size:11px;color:var(--mu)">لم يُرفع ملف بعد</div>':''}
    </div>`;
}

function cTrackDetail(itemId) {
  const it   = ALL_ITEMS.find(i=>i.id===itemId); if(!it) return;
  const reqs = getReqList(it);
  const rs   = getReqStatus(it);
  const critLabel = it.inst_crit_num ? `${it.inst_crit_num} — ${it.inst_crit_title}` : it.proc;

  const html = `
    <div class="card" style="margin-top:14px;border-top:3px solid var(--p)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">

          <div style="font-size:11px;color:var(--mu)">${it.crit_title||''}</div>

          <div style="font-size:12px;color:var(--mu);margin-top:2px">${AGS[it.agency]?.icon||''} ${it.agency_name} · أُرسل: ${it.sent_at||'—'}</div>
        </div>
        <button class="btn btn-g btn-sm" onclick="document.getElementById('c-track-detail').innerHTML=''">✕ إغلاق</button>

      ${it.committee_note?`<div class="notif ni">📝 ملاحظات الإرسال: ${it.committee_note}</div>`:''}

  document.getElementById('c-track-detail').innerHTML = html;
  document.getElementById('c-track-detail').scrollIntoView({behavior:'smooth', block:'nearest'});
}

function render_track_agencies(box) {
  const allAgs = {...AGS, ...EXTRA_AGENCIES};

  function donut(data, size=110) {
    const r=42,cx=55,cy=55;
    const total=data.reduce((s,d)=>s+d.v,0);
    if(!total) return `<svg width="${size}" height="${size}" viewBox="0 0 110 110"><circle cx="55" cy="55" r="42" fill="none" stroke="#e5e7eb" stroke-width="14"/><text x="55" y="60" text-anchor="middle" font-size="11" fill="#9ca3af" font-family="Cairo">لا بيانات</text></svg>`;
    let angle=-90; const slices=[];
    data.forEach(d=>{if(!d.v)return; const pct=d.v/total;
      const sa=angle*Math.PI/180,ea=(angle+pct*360)*Math.PI/180;
      const x1=cx+r*Math.cos(sa),y1=cy+r*Math.sin(sa),x2=cx+r*Math.cos(ea),y2=cy+r*Math.sin(ea);
      slices.push(`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${pct>0.5?1:0},1 ${x2},${y2} Z" fill="${d.c}" opacity="0.9"/>`);
      angle+=pct*360;});
    slices.push(`<circle cx="${cx}" cy="${cy}" r="28" fill="white"/>`);
    const ml=data.reduce((p,c)=>c.v>p.v?c:p,data[0]);
    slices.push(`<text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="14" font-weight="bold" fill="#1f2937" font-family="Cairo">${ml.v}</text>`);
    slices.push(`<text x="${cx}" y="${cy+11}" text-anchor="middle" font-size="8" fill="#6b7280" font-family="Cairo">${ml.l}</text>`);
    return `<svg width="${size}" height="${size}" viewBox="0 0 110 110">${slices.join('')}</svg>`;
  }

  const rows = Object.entries(allAgs).map(([k,ag])=>{
    const items=ALL_ITEMS.filter(i=>i.agency===k);
    let p=0,u=0,r=0,c=0;
    items.forEach(it=>getReqStatus(it).forEach(x=>{
      if(x.status==='pending')p++;else if(x.status==='under_review')u++;else if(x.status==='returned')r++;else if(x.status==='completed')c++;
    }));
    const total=p+u+r+c, pct=total?Math.round(c/total*100):0;
    return {k,ag,p,u,r,c,total,pct};
  });

  const donutsHtml = rows.map(({k,ag,p,u,r,c,total,pct})=>{
    const data=[
      {v:c,c:'#16a34a',l:'مكتمل'},
      {v:u,c:'#2563eb',l:'قيد المراجعة'},
      {v:r,c:'#dc2626',l:'معاد للملاحظات'},
      {v:p,c:'#d1d5db',l:'قيد الاستكمال'},
    ];
    return `<div class="card" style="text-align:center;min-width:180px;flex:1">
      <div style="font-size:13px;font-weight:700;color:var(--pd);margin-bottom:8px">${ag.icon||'🏢'} ${ag.name}</div>
      <div style="display:flex;justify-content:center">${donut(data)}</div>

function render_track_reviewers(box) {
  function donut(data, size=110) {
    const r=42,cx=55,cy=55;
    const total=data.reduce((s,d)=>s+d.v,0);
    if(!total) return `<svg width="${size}" height="${size}" viewBox="0 0 110 110"><circle cx="55" cy="55" r="42" fill="none" stroke="#e5e7eb" stroke-width="14"/><text x="55" y="60" text-anchor="middle" font-size="11" fill="#9ca3af" font-family="Cairo">لا بيانات</text></svg>`;
    let angle=-90; const slices=[];
    data.forEach(d=>{if(!d.v)return; const pct=d.v/total;
      const sa=angle*Math.PI/180,ea=(angle+pct*360)*Math.PI/180;
      const x1=cx+r*Math.cos(sa),y1=cy+r*Math.sin(sa),x2=cx+r*Math.cos(ea),y2=cy+r*Math.sin(ea);
      slices.push(`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${pct>0.5?1:0},1 ${x2},${y2} Z" fill="${d.c}" opacity="0.9"/>`);
      angle+=pct*360;});
    slices.push(`<circle cx="${cx}" cy="${cy}" r="28" fill="white"/>`);
    const ml=data.reduce((p,c)=>c.v>p.v?c:p,data[0]);
    slices.push(`<text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="14" font-weight="bold" fill="#1f2937" font-family="Cairo">${ml.v}</text>`);
    slices.push(`<text x="${cx}" y="${cy+11}" text-anchor="middle" font-size="8" fill="#6b7280" font-family="Cairo">${ml.l}</text>`);
    return `<svg width="${size}" height="${size}" viewBox="0 0 110 110">${slices.join('')}</svg>`;
  }

  if (!Object.keys(REVIEWERS).length) {
    box.innerHTML = '<div class="card"><div class="empty">لا يوجد مراجعون في النظام بعد</div></div>';
    return;
  }

  const rows = Object.entries(REVIEWERS).map(([k,rv])=>{

    }));
    let totalExpected=0;
    (rv.criteria||[]).forEach(cn=>{
      const main=INST_CRITERIA.find(m=>String(m.num)===String(cn));
      if(!main) return;
      main.subs.forEach(sub=>sub.criteria.forEach(crit=>{
        totalExpected+=(INST_REQUIREMENTS[crit.num]||[]).filter(r=>r&&r.trim()).length;
      }));
    });
    const totalSent=p+u+r+c;
    const notSent=Math.max(0,totalExpected-totalSent);
    const pct=totalExpected?Math.round(c/totalExpected*100):0;
    return {k,rv,notSent,p,u,r,c,totalExpected,pct};
  });

  const donutsHtml = rows.map(({k,rv,notSent,p,u,r,c,totalExpected,pct})=>{
    const data=[
      {v:c,      c:'#16a34a',l:'مكتمل'},
      {v:u,      c:'#2563eb',l:'قيد المراجعة'},
      {v:r,      c:'#dc2626',l:'معاد للملاحظات'},
      {v:p,      c:'#d1d5db',l:'قيد الاستكمال'},

    ];
    const critNames=(rv.criteria||[]).map(cn=>{const m=INST_CRITERIA.find(x=>String(x.num)===String(cn));return m?`معيار ${m.num}`:cn;}).join(' · ');
    return `<div class="card" style="text-align:center;min-width:200px;flex:1">
      <div style="font-size:13px;font-weight:700;color:var(--pd);margin-bottom:4px">👤 ${rv.name}</div>
      <div style="font-size:10px;color:var(--mu);margin-bottom:8px">${critNames}</div>
      <div style="display:flex;justify-content:center">${donut(data)}</div>
      <div style="margin-top:8px">
        ${data.map(d=>`<div style="display:flex;align-items:center;gap:6px;font-size:11px;margin-bottom:4px">
          <div style="width:9px;height:9px;border-radius:50%;background:${d.c};border:1px solid #e5e7eb;flex-shrink:0"></div>
          <span style="flex:1;text-align:right">${d.l}</span><strong>${d.v}</strong>
        </div>`).join('')}
        <div style="border-top:1px solid var(--bd);margin-top:6px;padding-top:6px;font-size:11px;font-weight:700">
          الإجمالي المتوقع: ${totalExpected} · إنجاز: ${pct}%
        </div>
      </div>
    </div>`;
  }).join('');

  box.innerHTML = `
    <div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px">${donutsHtml}</div>
    <div class="card">
      <div class="ctit">👤 جدول تقدم المراجعين</div>
      <div class="tw"><table class="tbl">

          <th>🔵 قيد المراجعة</th><th>↩ معاد للملاحظات</th>
          <th>✅ مكتمل</th><th>نسبة الإنجاز</th>

          <td style="font-weight:600">👤 ${rv.name}</td>
          <td style="font-size:11px">${(rv.criteria||[]).map(cn=>{const m=INST_CRITERIA.find(x=>String(x.num)===String(cn));return m?`<span class="chip" style="font-size:10px">معيار ${m.num}</span>`:''}).join('')}</td>

          <td><div style="display:flex;align-items:center;gap:8px">
            <div class="prog" style="flex:1;margin:0"><div class="pf" style="width:${pct}%;background:${pct===100?'#16a34a':'#6b3fa0'}"></div></div>

function render_c_track_filtered() {
  const allRows = [];

    let p=0,u=0,r=0,c=0;
    rs.forEach(x=>{
      if(x.status==='pending')p++;
      else if(x.status==='under_review')u++;
      else if(x.status==='returned')r++;
      else if(x.status==='completed')c++;
    });
    const total=reqs.length;
    const overallStatus=c===total&&total>0?'completed':u>0?'under_review':r>0?'returned':'pending';
    reqs.forEach((reqText,idx)=>{const rx=rs[idx]||{status:'pending'};
      allRows.push({it,idx,reqText,r:rx,critLabel});});

  const filtered = [...new Set(applyFilters(allRows,'cf-track').map(x=>x.it.id))].map(id=>ALL_ITEMS.find(i=>i.id===id));

    let p=0,u=0,r=0,c=0;
    rs.forEach(x=>{if(x.status==='pending')p++;else if(x.status==='under_review')u++;else if(x.status==='returned')r++;else if(x.status==='completed')c++;});

;

function render_track_reviewers(box) {
  // احتساب الإحصائيات لكل مراجع
  const rows = Object.entries(REVIEWERS).map(([k, rv]) => {
    // الإجراءات التي أرسلها هذا المراجع
    const sent = ALL_ITEMS.filter(it => it.sent_by === k);

    let pending=0, underReview=0, returned=0, completed=0;
    sent.forEach(it => getReqStatus(it).forEach(r => {
      if(r.status==='pending') pending++;
      else if(r.status==='under_review') underReview++;
      else if(r.status==='returned') returned++;
      else if(r.status==='completed') completed++;
    }));

    // احتساب المتطلبات "غير المرسلة" — معايير مخصصة للمراجع لكن لم يرسل فيها إجراءات
    const myCrits = rv.criteria || [];
    let totalExpected = 0;
    myCrits.forEach(cn => {
      const main = INST_CRITERIA.find(m => String(m.num) === String(cn));
      if (!main) return;
      main.subs.forEach(sub => {
        sub.criteria.forEach(crit => {
          const reqs = (INST_REQUIREMENTS[crit.num] || []).filter(r => r && r.trim());
          totalExpected += reqs.length;
        });
      });
    });
    const totalSent = pending + underReview + returned + completed;
    const notSent = Math.max(0, totalExpected - totalSent);
    const pct = totalExpected ? Math.round(completed/totalExpected*100) : 0;

    return {k, rv, notSent, pending, underReview, returned, completed, totalExpected, pct};
  });

  box.innerHTML = `
    <div class="card">
      <div class="ctit">👤 متابعة المراجعين</div>
      ${rows.length ? `<div class="tw"><table class="tbl">
        <thead><tr>
          <th>المراجع</th>
          <th>المعايير المخصصة</th>
          <th>⚪ غير مرسل</th>
          <th>⬜ قيد الاستكمال</th>
          <th>🔵 قيد المراجعة</th>
          <th>↩ معاد للملاحظات</th>
          <th>✅ مكتمل</th>
          <th>نسبة الإنجاز</th>
        </tr></thead>
        <tbody>
        ${rows.map(({k,rv,notSent,pending,underReview,returned,completed,totalExpected,pct}) => `<tr>
          <td style="font-weight:600">👤 ${rv.name}</td>
          <td style="font-size:11px">${(rv.criteria||[]).map(cn=>{const m=INST_CRITERIA.find(x=>String(x.num)===String(cn));return m?`<span class="chip" style="font-size:10px">معيار ${m.num}</span>`:''}).join('')}</td>
          <td>${notSent ? `<span style="background:#f3f4f6;color:#374151;border-radius:6px;padding:2px 8px;font-size:12px">${notSent}</span>` : '<span style="color:var(--mu)">—</span>'}</td>
          <td>${pending ? `<span class="bdg bs">${pending}</span>` : '<span style="color:var(--mu)">—</span>'}</td>
          <td>${underReview ? `<span class="bdg bu">${underReview}</span>` : '<span style="color:var(--mu)">—</span>'}</td>
          <td>${returned ? `<span class="bdg br">${returned}</span>` : '<span style="color:var(--mu)">—</span>'}</td>
          <td>${completed ? `<span class="bdg ba">${completed}</span>` : '<span style="color:var(--mu)">—</span>'}</td>
          <td>
            <div style="display:flex;align-items:center;gap:8px">
              <div class="prog" style="flex:1;margin:0"><div class="pf" style="width:${pct}%;background:${pct===100?'#16a34a':'#6b3fa0'}"></div></div>
              <span style="font-size:11px;font-weight:700;min-width:34px">${pct}%</span>
            </div>
          </td>
        </tr>`).join('')}
        </tbody>
      </table></div>` : '<div class="empty">لا يوجد مراجعون في النظام بعد</div>'}
    </div>`;
}


function render_c_track_filtered() {

    reqs.forEach((reqText,idx)=>{ const r=rs[idx]||{status:'pending'};
      allRows.push({it,idx,reqText,r,critLabel}); });
  });
  const filtered = applyFilters(allRows, 'cf-track');
  const tbody = document.getElementById('cf-track-body');
  if (!tbody) return;
  tbody.innerHTML = filtered.length ? filtered.map(({it,idx,reqText,r})=>{

    else if(r.status==='completed') badge='<span class="bdg ba">✅ مكتمل</span>';
    const reviewerTag=r.reviewed_by?`<span style="font-size:10px;color:#065f46;display:block">👤 ${r.reviewed_by}</span>`:'';

      <td style="font-size:11px">${it.crit_title||'—'}</td>

function cExp() {
  if(!ALL_ITEMS.length) { toast('لا توجد بيانات'); return; }
  const h=['المعيار','الإجراء','الجهة','الحالة','ملاحظات اللجنة','مستند الجهة','تاريخ الإرسال','تاريخ القرار'];

  const NL = String.fromCharCode(10);
  const csv=[h,...rows].map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join(NL);

function renderLogItems(logs) {
  if (!logs.length) return '<div class="empty">لا توجد نتائج</div>';
  // تجميع النشاطات حسب اليوم
  const byDay = {};
  logs.forEach(l => {
    const day = l.created_at ? l.created_at.split('T')[0] : 'unknown';
    if (!byDay[day]) byDay[day] = [];
    byDay[day].push(l);
  });
  return Object.entries(byDay).map(([day, items]) => `
    <div style="font-size:11px;font-weight:700;color:var(--mu);padding:8px 0 4px;border-bottom:2px solid var(--bd);margin-bottom:6px">${fmtDate(day+'T00:00:00')}</div>
    ${items.map(l => {
      const isReviewer = l.actor && !['عمادة التطوير والجودة','مدير النظام'].includes(l.actor) && !Object.values(AGS).map(a=>a.name).includes(l.actor);
      const isAgency = Object.values(AGS).map(a=>a.name).includes(l.actor) || Object.values(EXTRA_AGENCIES||{}).map(a=>a.name).includes(l.actor);
      const dotColor = isReviewer?'#065f46':isAgency?'#2563eb':'#6b3fa0';
      return `<div class="ar" style="margin-bottom:6px">
        <div class="ad" style="background:${dotColor}"></div>
        <div style="flex:1">
          <span style="font-size:12px">${l.msg}</span>
          <span style="color:var(--mu);font-size:10.5px;margin-right:6px">[${l.actor}]</span>
        </div>

function filterLog() {
  const q      = (document.getElementById('log-q')?.value||'').trim().toLowerCase();
  const actor  = document.getElementById('log-actor')?.value||'';
  const from   = document.getElementById('log-from')?.value||'';
  const to     = document.getElementById('log-to')?.value||'';
  const filtered = ALL_LOGS.filter(l => {
    if (q && !l.msg?.toLowerCase().includes(q) && !l.actor?.toLowerCase().includes(q)) return false;
    if (actor && l.actor !== actor) return false;
    const day = l.created_at ? l.created_at.split('T')[0] : '';
    if (from && day < from) return false;
    if (to   && day > to)   return false;
    return true;
  });
  const body = document.getElementById('log-body');
  const cnt  = document.getElementById('log-count');
  if (body) body.innerHTML = renderLogItems(filtered);
  if (cnt)  cnt.textContent = `${filtered.length} من ${ALL_LOGS.length} نشاط`;
}

function render_ag_home() {
  const ag = AGS[CU.agency] || EXTRA_AGENCIES[CU.agency] || {};
  const items = mine(); updateBadges();

  let totalReqs=0, pendingR=0, underR=0, returnedR=0, completedR=0;
  let totalExpectedReqs = 0;
  INST_CRITERIA.forEach(m => m.subs.forEach(s => s.criteria.forEach(c => {
    totalExpectedReqs += (INST_REQUIREMENTS[c.num]||[]).filter(r=>r&&r.trim()).length;
  })));
  items.forEach(it => getReqStatus(it).forEach(r => {
    totalReqs++;
    if(r.status==='pending')       pendingR++;
    else if(r.status==='under_review') underR++;
    else if(r.status==='returned')     returnedR++;
    else if(r.status==='completed')    completedR++;
  }));

  // إحصائيات كل معيار (مرتبطة بهذه الجهة فقط)
  const critStats = INST_CRITERIA.map(m => {
    let total=0, done=0;
    items.filter(it => String(it.crit_idx+1)===String(m.num) ||
      (it.inst_crit_num && it.inst_crit_num.split('.')[0]===String(m.num))
    ).forEach(it => getReqStatus(it).forEach(r => {
      total++;
      if(r.status==='completed') done++;
    }));
    return {title:m.title, num:m.num, total, done, pct:total?Math.round(done/total*100):0};
  }).filter(c => c.total > 0);

  // Donut Chart SVG
  function donut(data, size=130) {
    const r=50, cx=65, cy=65, stroke=18;
    const total = data.reduce((s,d)=>s+d.v,0);
    if(!total) return `<svg width="${size}" height="${size}" viewBox="0 0 130 130"><circle cx="65" cy="65" r="50" fill="none" stroke="#e5e7eb" stroke-width="18"/><text x="65" y="71" text-anchor="middle" font-size="13" fill="#9ca3af" font-family="Cairo">لا بيانات</text></svg>`;
    let angle = -90;
    const slices = [];
    data.forEach(d => {
      if(!d.v) return;
      const pct = d.v/total;
      const sa = angle*Math.PI/180, ea = (angle+pct*360)*Math.PI/180;
      const x1=cx+r*Math.cos(sa),y1=cy+r*Math.sin(sa);
      const x2=cx+r*Math.cos(ea),y2=cy+r*Math.sin(ea);
      slices.push(`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${pct>0.5?1:0},1 ${x2},${y2} Z" fill="${d.c}" opacity="0.9"/>`);
      angle += pct*360;
    });
    slices.push(`<circle cx="${cx}" cy="${cy}" r="${r-stroke}" fill="white"/>`);
    const mainLabel = data.reduce((p,c)=>c.v>p.v?c:p, data[0]);
    slices.push(`<text x="${cx}" y="${cy-5}" text-anchor="middle" font-size="17" font-weight="bold" fill="#1f2937" font-family="Cairo">${mainLabel.v}</text>`);
    slices.push(`<text x="${cx}" y="${cy+12}" text-anchor="middle" font-size="10" fill="#6b7280" font-family="Cairo">${mainLabel.l}</text>`);
    return `<svg width="${size}" height="${size}" viewBox="0 0 130 130">${slices.join('')}</svg>`;
  }

  const reqData = [
    {v:completedR, c:'#16a34a', l:'مكتمل'},
    {v:underR,     c:'#2563eb', l:'قيد المراجعة'},
    {v:returnedR,  c:'#dc2626', l:'معاد للملاحظات'},
    {v:pendingR,   c:'#d1d5db', l:'قيد الاستكمال'},
  ];

  document.getElementById('ag-home').innerHTML = `
    <div class="ph"><div class="pht"><h1>نظرة عامة</h1><p>${ag.name||''} — Supabase ☁</p></div>
    <button class="btn btn-g btn-sm" onclick="loadAll().then(()=>{render_ag_home();updateBadges();toast('تم التحديث')})">🔄</button></div>

    <!-- إحصائيات سريعة -->
    <div class="sr">
      <div class="sc" style="border-top:3px solid #dc2626"><div class="ico">📬</div><div class="num">${pendingR+returnedR}</div><div class="lbl">تتطلب رفع</div></div>
      <div class="sc" style="border-top:3px solid #2563eb"><div class="ico">🔵</div><div class="num">${underR}</div><div class="lbl">قيد المراجعة</div></div>
      <div class="sc" style="border-top:3px solid #16a34a"><div class="ico">✅</div><div class="num">${completedR}</div><div class="lbl">مكتمل</div></div>
      <div class="sc" style="border-top:3px solid #b45309"><div class="ico">↩</div><div class="num">${returnedR}</div><div class="lbl">معاد للملاحظات</div></div>
    </div>

    <div class="g2">
      <!-- Donut + أسطورة -->
      <div class="card">
        <div class="ctit">📊 توزيع المتطلبات</div>
        <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
          <div>${donut(reqData)}</div>
          <div style="flex:1;min-width:110px">
            ${reqData.map(d=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;font-size:12px">
              <div style="width:10px;height:10px;border-radius:50%;background:${d.c};flex-shrink:0"></div>
              <span style="flex:1">${d.l}</span>
              <strong>${d.v}</strong>
              <span style="color:var(--mu);font-size:10px">${totalExpectedReqs?Math.round(d.v/totalExpectedReqs*100):0}%</span>
            </div>`).join('')}
            <div style="border-top:1px solid var(--bd);margin-top:8px;padding-top:8px;font-size:12px;font-weight:700">
              الإجمالي: ${totalReqs} متطلب
            </div>
          </div>
        </div>
      </div>

      <!-- تقدم المعايير -->
      <div class="card">
        <div class="ctit">📋 تقدم المعايير</div>
        ${critStats.length ? critStats.map(c=>`
          <div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
              <span>معيار ${c.num}: ${c.title}</span>
              <span style="color:var(--mu)">${c.done}/${c.total} (${c.pct}%)</span>
            </div>
            <div class="prog"><div class="pf" style="width:${c.pct}%;background:${c.pct===100?'#16a34a':'#6b3fa0'}"></div></div>
          </div>`).join('') : '<div class="empty">لا توجد إجراءات بعد</div>'}
        ${critStats.length?`<div style="font-size:12px;font-weight:700;color:var(--ok);margin-top:8px">
          معايير مكتملة: ${critStats.filter(c=>c.pct===100).length} / ${critStats.length}
        </div>`:''}
      </div>
    </div>`;

// ─── استخراج/تهيئة حالة المتطلبات لإجراء معيّن ───
function getReqList(it) {
  let data = [];
  try { data = JSON.parse(it.inst_requirements || '[]'); } catch(e) {}
  if (!data.length || !data[0] || !data[0].reqs) return [];
  return data[0].reqs || [];
}

function getReqStatus(it) {
  let rs = [];
  try { rs = JSON.parse(it.req_status || '[]'); } catch(e) {}
  const reqs = getReqList(it);
  // تأكد من تطابق طول المصفوفة مع عدد المتطلبات
  const out = [];
  for (let i = 0; i < reqs.length; i++) {
    out.push(rs[i] || {file:'', uploaded_at:'', agency_note:'', committee_note:'', status:'pending'});
  }
  return out;
}

const REQ_STX = {
  pending: '⬜ غير مكتمل',
  under_review: '🔵 قيد المراجعة',
  returned: '↩ معاد للملاحظات',
  completed: '✅ مكتمل'
};
const REQ_CLS = {
  pending: 'bs',
  under_review: 'bu',
  returned: 'br',
  completed: 'ba'
};

function instReqsHtml(it) {
  if (!it.inst_crit_num) return '';
  let data = [];
  try { data = JSON.parse(it.inst_requirements || '[]'); } catch(e) {}

  const isGrouped = data.length && typeof data[0] === 'object' && data[0].reqs;

  let body = '';
  if (isGrouped) {
    body = data.map(g => `
      <div style="margin-top:6px">
        <div style="font-size:11.5px;font-weight:700">${g.num} — ${g.title}</div>
        ${g.reqs && g.reqs.length ? `<ul style="margin:2px 0 0;padding-right:18px;font-size:11px">${g.reqs.map(r=>`<li style="margin-bottom:2px">${r}</li>`).join('')}</ul>` : ''}
      </div>`).join('');
  } else if (data.length) {
    body = `<ul style="margin:6px 0 0;padding-right:18px;font-size:11.5px">${data.map(r=>`<li style="margin-bottom:2px">${r}</li>`).join('')}</ul>`;
  }

  return `<div class="notif" style="background:#f5f3ff;color:#6d28d9;border:1px solid #ddd6fe;flex-direction:column;align-items:stretch">
    <div style="font-size:12px;font-weight:700">📋 المعيار الفرعي: ${it.inst_crit_num} — ${it.inst_crit_title || ''}</div>
    ${body}
  </div>`;
}

async function agUploadReq(itemId, idx) {
  const fi = document.getElementById(`fi-${itemId}-${idx}`);
  const noteEl = document.getElementById(`an-${itemId}-${idx}`);
  if (!fi || !fi.files[0]) { toast('❗ يرجى اختيار ملف أولاً'); return; }

  const it = ALL_ITEMS.find(i => i.id === itemId);
  const file = fi.files[0];

  try {
    loading(true, 'جاري رفع الملف...');
    // رفع الملف إلى Supabase Storage
    // استخدام timestamp + امتداد الملف فقط لتجنب أي مشكلة في Storage
    const ext = file.name.includes('.') ? file.name.split('.').pop().toLowerCase() : 'bin';
    const safeExt = ext.replace(/[^a-z0-9]/g, '');
    const path = `${CU.agency}/${itemId}/${idx}_${Date.now()}.${safeExt}`;
    const fileUrl = await sbUploadFile(path, file);

    const rs = getReqStatus(it);
    const now = new Date().toISOString();
    const agNote = noteEl ? noteEl.value.trim() : '';

    // إضافة الحدث لسجل التتبع
    const history = rs[idx]?.history || [];
    history.push({
      type: 'agency_upload',
      label: 'رفع الجهة',
      file: file.name,
      file_url: fileUrl,
      note: agNote,
      date: now,
      by: CU.name || CU.id
    });

    // حفظ الملف السابق في file_history
    const fileHistory = rs[idx]?.file_history || [];
    if (rs[idx]?.file) fileHistory.push({file:rs[idx].file, file_url:rs[idx].file_url||'', uploaded_at:rs[idx].uploaded_at||''});

    rs[idx] = {
      file: file.name,
      file_url: fileUrl,

function render_ag_track() {
  // صف لكل متطلب (جميع الحالات) — نفس شكل الإجراءات الواردة بدون زر عرض
  const rows = [];
  mine().forEach(it => {
    const reqs = getReqList(it);
    const rs   = getReqStatus(it);
    const critLabel = it.inst_crit_num
      ? `${it.inst_crit_num} — ${it.inst_crit_title}`
      : it.proc;
    // سطر لكل متطلب — نستخدم reqs (النصوص) كمصدر رئيسي
    reqs.forEach((reqText, idx) => {
      const r = rs[idx] || {status:'pending'};
      rows.push({it, idx, reqText, r, critLabel});
    });
  });

  document.getElementById('ag-track').innerHTML = `
    <div class="ph"><div class="pht"><h1>تتبع الإجراءات</h1></div>
    <button class="btn btn-g btn-sm" onclick="loadAll().then(()=>{render_ag_track();toast('تم التحديث')})">🔄</button></div>

      <thead><tr><th>المحك</th><th>المتطلب</th><th>الحالة</th><th>تفاصيل</th></tr></thead>
      <tbody id="af-track-body">
      ${rows.length ? rows.map(({it, idx, reqText, r, critLabel}) => {
        const st = r.status || 'pending';
        let badge = '';
        if      (st==='pending')      badge = '<span class="bdg bs">⬜ قيد الاستكمال</span>';
        else if (st==='under_review') badge = '<span class="bdg bu">🔵 قيد المراجعة</span>';
        else if (st==='returned')     badge = '<span class="bdg br">↩ معاد للملاحظات</span>';
        else if (st==='completed')    badge = '<span class="bdg ba">✅ مكتملة</span>';
        return `
          <tr>
            <td style="font-weight:600;font-size:12px">${critLabel}</td>
            <td style="font-size:12px">${reqText}</td>
            <td>${badge}</td>
          </tr>
          ${st==='returned' && r.committee_note
            ? `<tr><td colspan="3" style="font-size:11px;color:#b91c1c;padding-right:28px">↩ ملاحظة: ${r.committee_note}</td></tr>`

      </tbody>
    </table></div></div>`;
  setTimeout(()=>showFilterCount('af-track',rows.length,rows.length),0);
}

function render_ag_track_filtered() {
  const allRows=[];
  mine().forEach(it=>{
    const reqs=getReqList(it),rs=getReqStatus(it);
    const critLabel=it.inst_crit_num?`${it.inst_crit_num} — ${it.inst_crit_title}`:it.proc;
    reqs.forEach((reqText,idx)=>{const r=rs[idx]||{status:'pending'};
      allRows.push({it,idx,reqText,r,critLabel});});
  });
  const filtered=applyFilters(allRows,'af-track');

    else if(st==='returned') badge='<span class="bdg br">↩ معاد للملاحظات</span>';
    else if(st==='completed') badge='<span class="bdg ba">✅ مكتملة</span>';
    return `<tr>
      <td style="font-weight:600;font-size:12px">${critLabel}</td>

function render_adm_home()   {
  // نفس إحصائيات العمادة
  const t=ALL_ITEMS.length;
  let pendingReqs=0,underReview=0,returned=0,completed=0;
  ALL_ITEMS.forEach(it=>getReqStatus(it).forEach(r=>{
    if(r.status==='pending')pendingReqs++;
    else if(r.status==='under_review')underReview++;
    else if(r.status==='returned')returned++;
    else if(r.status==='completed')completed++;
  }));
  let admTotalExpected=0;
  INST_CRITERIA.forEach(m=>m.subs.forEach(s=>s.criteria.forEach(c=>{
    admTotalExpected+=(INST_REQUIREMENTS[c.num]||[]).filter(r=>r&&r.trim()).length;
  })));
  const totalExpectedReqs = admTotalExpected;
  const admNotSent=Math.max(0,admTotalExpected-(pendingReqs+underReview+returned+completed));
  updateBadges();

  function donut(data,size=130){
    const r=50,cx=65,cy=65;
    const total=data.reduce((s,d)=>s+d.v,0);
    if(!total)return `<svg width="${size}" height="${size}" viewBox="0 0 130 130"><circle cx="65" cy="65" r="50" fill="none" stroke="#e5e7eb" stroke-width="18"/><text x="65" y="71" text-anchor="middle" font-size="13" fill="#9ca3af" font-family="Cairo">لا بيانات</text></svg>`;
    let angle=-90; const slices=[];
    data.forEach(d=>{if(!d.v)return; const pct=d.v/total; const sa=angle*Math.PI/180,ea=(angle+pct*360)*Math.PI/180;
      const x1=cx+r*Math.cos(sa),y1=cy+r*Math.sin(sa),x2=cx+r*Math.cos(ea),y2=cy+r*Math.sin(ea);
      slices.push(`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${pct>0.5?1:0},1 ${x2},${y2} Z" fill="${d.c}" opacity="0.9"/>`);
      angle+=pct*360;});
    slices.push(`<circle cx="${cx}" cy="${cy}" r="32" fill="white"/>`);
    const ml=data.reduce((p,c)=>c.v>p.v?c:p,data[0]);
    slices.push(`<text x="${cx}" y="${cy-5}" text-anchor="middle" font-size="17" font-weight="bold" fill="#1f2937" font-family="Cairo">${ml.v}</text>`);
    slices.push(`<text x="${cx}" y="${cy+12}" text-anchor="middle" font-size="9" fill="#6b7280" font-family="Cairo">${ml.l}</text>`);
    return `<svg width="${size}" height="${size}" viewBox="0 0 130 130">${slices.join('')}</svg>`;
  }
  const reqData=[{v:completed,c:'#16a34a',l:'مكتمل'},{v:underReview,c:'#2563eb',l:'قيد المراجعة'},{v:returned,c:'#dc2626',l:'معاد للملاحظات'},{v:pendingReqs,c:'#d1d5db',l:'قيد الاستكمال'}];
  const totalReqs=pendingReqs+underReview+returned+completed;

  document.getElementById('adm-home').innerHTML=`
    <div class="ph"><div class="pht"><h1>نظرة عامة</h1><p>مدير النظام — صلاحيات كاملة</p></div>
    <button class="btn btn-g btn-sm" onclick="loadAll().then(()=>{render_adm_home();toast('تم التحديث')})">🔄</button></div>
    <div class="sr">
      <div class="sc" style="border-top:3px solid #374151"><div class="ico">📤</div><div class="num">${t}</div><div class="lbl">إجراءات مُرسلة</div></div>
      <div class="sc" style="border-top:3px solid #2563eb"><div class="ico">🔵</div><div class="num">${underReview}</div><div class="lbl">قيد المراجعة</div></div>
      <div class="sc" style="border-top:3px solid #16a34a"><div class="ico">✅</div><div class="num">${completed}</div><div class="lbl">مكتمل</div></div>
      <div class="sc" style="border-top:3px solid #b45309"><div class="ico">⏳</div><div class="num">${pendingReqs}</div><div class="lbl">لم يُرفع</div></div>
    </div>
    <div class="g2">
      <div class="card"><div class="ctit">📊 توزيع المتطلبات</div>
        <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
          <div>${donut(reqData)}</div>
          <div style="flex:1;min-width:110px">${reqData.map(d=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;font-size:12px">
            <div style="width:10px;height:10px;border-radius:50%;background:${d.c};flex-shrink:0"></div>
            <span style="flex:1">${d.l}</span><strong>${d.v}</strong>
            <span style="color:var(--mu);font-size:10px">${totalExpectedReqs?Math.round(d.v/totalExpectedReqs*100):0}%</span>
          </div>`).join('')}
          <div style="border-top:1px solid var(--bd);margin-top:8px;padding-top:8px;font-size:12px;font-weight:700">الإجمالي: ${totalExpectedReqs} متطلب</div></div>
        </div>
      </div>
      <div class="card"><div class="ctit">${ico.ppl}الجهات</div>
        <table class="tbl"><thead><tr><th>الجهة</th><th>✅</th><th>🔵</th><th>↩</th><th>⬜</th><th>%</th></tr></thead><tbody>
        ${Object.entries({...AGS,...EXTRA_AGENCIES}).map(([k,ag])=>{
          let p=0,u=0,rv=0,c=0;
          ALL_ITEMS.filter(i=>i.agency===k).forEach(it=>getReqStatus(it).forEach(x=>{
            if(x.status==='pending')p++;else if(x.status==='under_review')u++;else if(x.status==='returned')rv++;else if(x.status==='completed')c++;
          }));
          const tot=p+u+rv+c; const pct=tot?Math.round(c/tot*100):0;
          return `<tr><td style="font-size:11px">${ag.icon||''} ${ag.name}</td><td>${c}</td><td>${u}</td><td>${rv}</td><td>${p}</td>
            <td><div class="prog" style="min-width:60px"><div class="pf" style="width:${pct}%;background:${pct===100?'#16a34a':'#374151'}"></div></div>${pct}%</td></tr>`;
        }).join('')}</tbody></table>
      </div>
    </div>`;
}

async function admDecideReq(itemId,idx,decision) {
  const note=(document.getElementById(`adm-note-${itemId}-${idx}`)?.value||'').trim();
  const it=ALL_ITEMS.find(i=>i.id===itemId); if(!it) return;
  const rs=getReqStatus(it);
  const decNow = new Date().toISOString();
  const decHistory = rs[idx].history || [];
  decHistory.push({type:decision==='completed'?'committee_complete':'committee_return',
    label:decision==='completed'?'اعتماد':'إعادة للملاحظات',
    note:decision==='returned'?note:'', date:decNow, by:CU.name||CU.id});
  rs[idx].history = decHistory;
  rs[idx].status=decision; rs[idx].committee_note=decision==='returned'?note:''; rs[idx].reviewed_by=CU.name; rs[idx].history=decHistory;
  try {
    loading(true,'جاري حفظ القرار...');
    await sbPatch('procedures',itemId,{req_status:JSON.stringify(rs)});
    const label=decision==='completed'?'اعتماد':'إعادة للملاحظات';
    await sbPost('activity_log',{msg:`[مدير النظام] ${label}: "${getReqList(it)[idx]}" (${it.agency_name})`,actor:CU.name});
    await loadAll(); loading(false);
    showScreen('adm-appr'); render_adm_appr();
    toast(decision==='completed'?'✅ تم الاعتماد':'↩ تم الإعادة',decision==='completed');
  } catch(e){loading(false);toast('❗ فشل: '+e.message);}
}

function admFilterLog(){
  const q=(document.getElementById('admlog-q')?.value||'').toLowerCase();
  const actor=document.getElementById('admlog-actor')?.value||'';
  const from=document.getElementById('admlog-from')?.value||'';
  const to=document.getElementById('admlog-to')?.value||'';
  const filtered=ALL_LOGS.filter(l=>{
    if(q&&!l.msg?.toLowerCase().includes(q)&&!l.actor?.toLowerCase().includes(q))return false;
    if(actor&&l.actor!==actor)return false;
    const day=l.created_at?l.created_at.split('T')[0]:'';
    if(from&&day<from)return false; if(to&&day>to)return false; return true;
  });
  const body=document.getElementById('admlog-body'),cnt=document.getElementById('admlog-count');
  if(body)body.innerHTML=renderLogItems(filtered);
  if(cnt)cnt.textContent=`${filtered.length} من ${ALL_LOGS.length} نشاط`;
}
